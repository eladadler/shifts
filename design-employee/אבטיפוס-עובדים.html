document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

iv>\n        <div style=\"font-size: 15px; color: #6B6760; margin-bottom: 32px;\">החשבון נוצר על ידי המנהל. אין הרשמה עצמית.<\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 16px;\">\n          <div style=\"display: flex; flex-direction: column; gap: 6px;\">\n            <span style=\"font-size: 13px; font-weight: 800;\">אימייל<\u002Fspan>\n            <input type=\"email\" placeholder=\"dana@example.com\" value=\"{{ email }}\" onchange=\"{{ onEmail }}\" style=\"border: 1.5px solid #1C1A17; border-radius: 8px; padding: 13px 14px; font-size: 15px; font-family: 'Noto Sans Hebrew', Heebo, sans-serif; background: #FFFFFF; color: #1C1A17; direction: ltr; text-align: right;\">\n          <\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 6px;\">\n            <span style=\"font-size: 13px; font-weight: 800;\">סיסמה<\u002Fspan>\n            <input type=\"password\" placeholder=\"••••••••\" value=\"{{ password }}\" onchange=\"{{ onPassword }}\" style=\"border: {{ pwBd }}; border-radius: 8px; padding: 13px 14px; font-size: 15px; font-family: 'Noto Sans Hebrew', Heebo, sans-serif; background: {{ pwBg }}; color: #1C1A17;\">\n            <sc-if value=\"{{ loginErr }}\" hint-placeholder-val=\"{{ false }}\">\n              <span style=\"font-size: 13px; font-weight: 600; color: oklch(0.5 0.18 25);\">האימייל או הסיסמה שגויים. נסו שוב או אפסו סיסמה.<\u002Fspan>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <div onclick=\"{{ onLogin }}\" style=\"background: #1C1A17; color: #FFFFFF; border-radius: 8px; padding: 14px 0; text-align: center; font-size: 15px; font-weight: 800; cursor: pointer; margin-top: 8px; transition: background 0.15s;\" style-hover=\"background: #33302B;\">כניסה<\u002Fdiv>\n          <div onclick=\"{{ onReset }}\" style=\"text-align: center; font-size: 14px; font-weight: 700; color: color-mix(in oklab, #41ABC3 70%, black); cursor: pointer; text-decoration: underline; text-underline-offset: 3px;\">שכחתי סיסמה<\u002Fdiv>\n          <sc-if value=\"{{ resetSent }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"text-align: center; font-size: 13px; font-weight: 600; color: oklch(0.45 0.1 160); background: oklch(0.96 0.03 160); border-radius: 8px; padding: 10px 12px;\">שלחנו קישור לאיפוס סיסמה לכתובת האימייל שלך ✓<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"margin-top: auto; padding-top: 32px; text-align: center; font-size: 12px; color: #A09C94;\">דמו: כל אימייל תקין וסיסמה יתקבלו<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ אפליקציה ============ -->\n    <sc-if value=\"{{ isApp }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"padding: 13px 18px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1.5px solid #1C1A17; position: relative; background: #FFFFFF; flex-shrink: 0;\">\n        <div style=\"display: flex; align-items: center; gap: 9px;\">\n          <div style=\"width: 28px; height: 28px; border-radius: 7px; background: #1C1A17; color: #FFFFFF; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900;\">מ<\u002Fdiv>\n          <div style=\"font-size: 14px; font-weight: 800; white-space: nowrap;\">משמרות המהפכה<\u002Fdiv>\n        <\u002Fdiv>\n        <div onclick=\"{{ toggleMenu }}\" style=\"display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: background 0.15s;\" style-hover=\"background: #F4F2EE;\">\n          <span style=\"font-size: 13px; font-weight: 700;\">דנה לוי<\u002Fspan>\n          <div style=\"width: 30px; height: 30px; border-radius: 50%; background: color-mix(in oklab, #41ABC3 14%, white); color: color-mix(in oklab, #41ABC3 65%, black); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px;\">ד<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ menuOpen }}\" hint-placeholde 12px 14px; font-size: 13px; font-family: 'Noto Sans Hebrew', Heebo, sans-serif; background: #FFFFFF; color: #1C1A17; resize: none; height: 68px;\"><\u002Ftextarea>\n              <div onclick=\"{{ onSubmit }}\" style=\"background: {{ submitBtn.bg }}; color: {{ submitBtn.color }}; border: {{ submitBtn.bd }}; border-radius: 10px; padding: 14px 0; text-align: center; font-size: 15px; font-weight: 800; cursor: pointer; transition: background 0.2s, color 0.2s;\">{{ submitBtn.label }}<\u002Fdiv>\n              <sc-if value=\"{{ sentLineVisible }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"font-size: 12px; font-weight: 600; color: #8A867F; text-align: center;\">{{ sentLine }}<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ lockedHasNote }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background: #FFFFFF; border: 1px solid #EAE7E1; border-radius: 12px; padding: 13px 14px; display: flex; flex-direction: column; gap: 6px;\">\n                <div style=\"font-size: 12px; font-weight: 800; color: #8A867F;\">הערות למשבץ<\u002Fdiv>\n                <div style=\"font-size: 14px; line-height: 1.6;\">{{ lockedNote }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ lockedSentVisible }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-size: 12px; font-weight: 600; color: #8A867F; text-align: center;\">{{ lockedSent }}<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ lockedEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding: 36px 24px; text-align: center; font-size: 14px; color: #8A867F;\">לא הגשת בקשות לחודש זה.<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n\n      <!-- טאבים -->\n      <div style=\"display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1.5px solid #1C1A17; background: #FFFFFF; flex-shrink: 0;\">\n        <div onclick=\"{{ onTabHome }}\" style=\"padding: 13px 0 17px; text-align: center; font-size: 13px; font-weight: {{ tabHome.fw }}; color: {{ tabHome.color }}; border-top: 3px solid {{ tabHome.bar }}; margin-top: -1.5px; cursor: pointer; transition: color 0.15s;\">הבית<\u002Fdiv>\n        <div onclick=\"{{ onTabSched }}\" style=\"padding: 13px 0 17px; text-align: center; font-size: 13px; font-weight: {{ tabSched.fw }}; color: {{ tabSched.color }}; border-top: 3px solid {{ tabSched.bar }}; margin-top: -1.5px; cursor: pointer; transition: color 0.15s;\">הסידור<\u002Fdiv>\n        <div onclick=\"{{ onTabReq }}\" style=\"padding: 13px 0 17px; text-align: center; font-size: 13px; font-weight: {{ tabReq.fw }}; color: {{ tabReq.color }}; border-top: 3px solid {{ tabReq.bar }}; margin-top: -1.5px; cursor: pointer; transition: color 0.15s;\">הגשת בקשות<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'login',\n    email: '',\n    password: '',\n    loginErr: false,\n    resetSent: false,\n    tab: 'home',\n    menuOpen: false,\n    schedIdx: 0,\n    view: 'grid',\n    onlyMine: false,\n    selDay: 11,\n    weekIdx: 1,\n    reqIdx: 2,\n    brush: 'un',\n    requests: {\n      '06': { marks: {}, note: '', sentAt: null, dirty: false },\n      '07': { marks: { 5: 'un', 6: 'un', 18: 'high', 19: 'high', 26: 'can' }, note: 'מעדיפה משמרות לילה. ב־5–6 ביולי אני בחו\"ל.', sentAt: '12 ביוני, 09:14', dirty: false },\n      '08': { marks: {}, note: '', sentAt: null, dirty: false },\n    },\n  };\n\n  EMP = { e1: 'יוסי כהן', e2: 'נועה פרידמן', e3: 'אבי מזרחי', e4: 'שירה ברק', e5: 'עומר אדלר', e6: 'תמר גולן', e7: 'דנה לוי', e8: 'איתי שקד' };\n\n  MONTHS = [\n    { key: '06', label: 'יוני 2026', inMonth: 'ביוני', days: 30, offset: 1, published: true, today: 11,\n      my: { 2: 'evening', 4: 'morning', 8: 'morning', 11: 'night', 16: 'evening', 20: 'short', 25: 'morning', 29: 'evening' } },\n    { key: '07', label: 'יולי 2026', inMonth: 'ביולי', days: 31, offset: 3, published: true,\n      my: { 1: 'morning', 3: 'short', 7: 'evening', 9: 'morning', 14: 'night', 17: 'short', 22: 'night', 28: 'morning' },\n      special: { day: 10, label: 'כוננות 48 שעות', time: '10–11 ביולי · מ־07:00' } },\n    { key: '08', label: 'אוגוסט 2026', inMonth: 'באוגוסט', days: 31, offset: 6, published: false, my: {} },\n  ];\n\n  buildMonth(cfg) {\n    const DOTS = { morning: 'oklch(0.78 0.13 80)', evening: 'oklch(0.62 0.12 250)', short: 'oklch(0.68 0.11 160)', night: 'oklch(0.45 0.09 290)', oncall: 'oklch(0.62 0.14 25)' };\n    const LABELS = { morning: 'בוקר', evening: 'ערב', short: 'קצר', night: 'לילה' };\n    const dayNames = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];\n    const others = ['e1', 'e2', 'e3', 'e4', 'e5', 'e6', 'e8'];\n    let rot = 0;\n    const days = [];\n    for (let d = 1; d <= cfg.days; d++) {\n      const dow = (d - 1 + cfg.offset) % 7;\n      const weekend = dow === 5 || dow === 6;\n      const defs = weekend\n        ? [['morning', '07:00–15:00', 2], ['short', '15:00–19:00', 1], ['night', '19:00–07:00', 1]]\n        : [['morning', '07:00–15:00', 2], ['evening', '15:00–23:00', 1], ['night', '23:00–07:00', 1]];\n      const used = {};\n      const shifts = defs.map((def) => {\n        const id = def[0];\n        const people = [];\n        if (cfg.my[d] === id) people.push('e7');\n        while (people.length < def[2]) {\n          const cand = others[rot % 7];\n          rot = rot + 1;\n          if (!used[cand]) { used[cand] = true; people.push(cand); }\n        }\n        return { id: id, label: LABELS[id], time: def[1], dot: DOTS[id], people: people, mine: cfg.my[d] === id, special: false };\n      });\n      if (cfg.special && d === cfg.special.day) {\n        const free = others.filter((o) => !used[o]);\n        shifts.push({ id: 'oncall', label: cfg.special.label, time: cfg.special.time, dot: DOTS.oncall, people: [free[0] || 'e6'], mine: false, special: true });\n      }\n      days.push({ num: d, dow: dow, dayName: dayNames[dow], weekend: weekend, shifts: shifts, mine: !!cfg.my[d] });\n    }\n    return days;\n  }\n\n  getDays(cfg) {\n    if (!this._cache) this._cache = {};\n    if (!this._cache[cfg.key]) this._cache[cfg.key] = this.buildMonth(cfg);\n    return this._cache[cfg.key];\n  }\n\n  renderVals() {\n    const st = this.state;\n    const ink = '#1C1A17';\n    const teal = '#41ABC3';\n    const tealDark = 'color-mix(in oklab, #41ABC3 70%, black)';\n    const tealSoft = 'color-mix(in oklab, #41ABC3 14%, white)';\n\n    const personChip = (id) => ({\n      name: id === 'e7' ? 'דנה לוי · אני' : this.EMP[id],\n      bg: id === 'e7' ? teal : '#F2F0EC',\n      color: id === 'e7' ? '#FFFFFF' : '#4A4640',\n      fw: id === 'e7' ? '700' : '500',\n    });\n\n    const shiftRow = (sh) => ({\n      label: sh.label,\n      time: sh.time,\n      dot: sh.dot,\n      rowBg: sh.mine ? tealSoft : (sh.special ? 'oklch(0.96 0.04 80)' : '#FBFAF8'),\n      rowBd: sh.mine ? ('1.5px solid ' + teal) : (sh.special ? '1px dashed oklch(0.72 0.1 70)' : '1px solid #ECEAE5'),\n      people: sh.people.map(personChip),\n    });\n\n    // ---------- login ----------\n    const out = {\n      isLogin: st.screen === 'login',\n      isApp: st.screen === 'app',\n      email: st.email,\n      password: st.password,\n      loginErr: st.loginErr,\n      resetSent: st.resetSent,\n      onEmail: (e) => this.setState({ email: e.target.value, loginErr: false }),\n      onPassword: (e) => this.setState({ password: e.target.value, loginErr: false }),\n      onLogin: () => {\n        if (st.email.indexOf('@') > 0 && st.password.length > 0) {\n          this.setState({ screen: 'app', tab: 'home', loginErr: false, resetSent: false, menuOpen: false });\n        } else {\n          this.setState({ loginErr: true });\n        }\n      },\n      onReset: () => this.setState({ resetSent: true }),\n      pwBd: st.loginErr ? '1.5px solid oklch(0.55 0.18 25)' : '1.5px solid #1C1A17',\n      pwBg: st.loginErr ? 'oklch(0.98 0.01 25)' : '#FFFFFF',\n\n      // ---------- shell ----------\n      menuOpen: st.menuOpen,\n      toggleMenu: () => this.setState({ menuOpen: !st.menuOpen }),\n      onLogout: () => this.setState({ screen: 'login', email: '', password: '', loginErr: false, resetSent: false, menuOpen: false, tab: 'home' }),\n      isHome: st.tab === 'home',\n      isSched: st.tab === 'schedule',\n      isReq: st.tab === 'requests',\n      tabHome: st.tab === 'home' ? { color: ink, fw: '800', bar: teal } : { color: '#8A867F', fw: '500', bar: 'transparent' },\n      tabSched: st.tab === 'schedule' ? { color: ink, fw: '800', bar: teal } : { color: '#8A867F', fw: '500', bar: 'transparent' },\n      tabReq: st.tab === 'requests' ? { color: ink, fw: '800', bar: teal } : { color: '#8A867F', fw: '500', bar: 'transparent' },\n      onTabHome: () => this.setState({ tab: 'home', menuOpen: false }),\n      onTabSched: () => this.setState({ tab: 'schedule', menuOpen: false }),\n      onTabReq: () => this.setState({ tab: 'requests', menuOpen: false }),\n    };\n\n    // ---------- home: next + upcoming shifts ----------\n    const TODAY_M = 0;\n    const TODAY_D = 11;\n    const relOf = (off) => (off === 0 ? 'היום' : (off === 1 ? 'מחר' : 'בעוד ' + off + ' ימים'));\n    const upcoming = [];\n    [0, 1].forEach((mi) => {\n      const c = this.MONTHS[mi];\n      const dys = this.getDays(c);\n      dys.forEach((d) => {\n        if (!d.mine) return;\n        if (mi === TODAY_M && d.num < TODAY_D) return;\n        const sh = d.shifts.find((s) => s.mine);\n        if (!sh) return;\n        const off = mi === TODAY_M ? (d.num - TODAY_D) : (this.MONTHS[0].days - TODAY_D + d.num);\n        upcoming.push({ c: c, d: d, sh: sh, off: off });\n      });\n    });\n    const hero = upcoming[0];\n    out.heroRel = relOf(hero.off);\n    out.heroLabel = hero.sh.label;\n    out.heroTime = hero.sh.time;\n    out.heroDot = hero.sh.dot;\n    out.heroDate = 'יום ' + hero.d.dayName + ', ' + hero.d.num + ' ' + hero.c.inMonth;\n    const mates = hero.sh.people.filter((p) => p !== 'e7').map((p) => this.EMP[p]);\n    out.heroMates = mates.length > 0 ? ('יחד עם: ' + mates.join(', ')) : 'משמרת יחיד — את לבד במשמרת זו';\n    out.upcomingList = upcoming.slice(1).map((u) => ({\n      num: String(u.d.num),\n      month: u.c.label.split(' ')[0],\n      dayName: u.d.dayName,\n      label: u.sh.label,\n      time: u.sh.time,\n      dot: u.sh.dot,\n      rel: relOf(u.off),\n    }));\n    out.onGoSched = () => this.setState({ tab: 'schedule' });\n\n    // ---------- schedule ----------\n    const cfg = this.MONTHS[st.schedIdx];\n    const days = this.getDays(cfg);\n    const gotoMonth = (idx) => {\n      const c = this.MONTHS[idx];\n      const sel = c.today || 1;\n      this.setState({ schedIdx: idx, selDay: sel, weekIdx: Math.floor((sel - 1 + c.offset) / 7) });\n    };\n    out.monthLabel = cfg.label;\n    out.onPrevMonth = () => { if (st.schedIdx > 0) gotoMonth(st.schedIdx - 1); };\n    out.onNextMonth = () => { if (st.schedIdx < 2) gotoMonth(st.schedIdx + 1); };\n    out.prevMonthOp = st.schedIdx > 0 ? '1' : '0.3';\n    out.nextMonthOp = st.schedIdx < 2 ? '1' : '0.3';\n    out.schedPublished = cfg.published;\n    out.schedEmpty = !cfg.published;\n    out.emptyTitle = 'הסידור ל' + cfg.label + ' טרם פורסם';\n    out.emptyCta = 'להגשת בקשות ל' + cfg.label.split(' ')[0];\n    out.onGoRequests = () => this.setState({ tab: 'requests', reqIdx: 2 });\n\n    const myCount = Object.keys(cfg.my).length;\n    const nights = Object.keys(cfg.my).filter((k) => cfg.my[k] === 'night').length;\n    out.summary = myCount + ' משמרות החודש · ' + (nights === 1 ? 'לילה אחד' : nights + ' לילות');\n\n    out.segGrid = st.view === 'grid'\n      ? { bg: ink, color: '#FFFFFF', onClick: () => {} }\n      : { bg: 'transparent', color: '#8A867F', onClick: () => this.setState({ view: 'grid' }) };\n    out.segList = st.view === 'list'\n      ? { bg: ink, color: '#FFFFFF', onClick: () => {} }\n      : { bg: 'transparent', color: '#8A867F', onClick: () => this.setState({ view: 'list' }) };\n    out.isGrid = st.view === 'grid' && cfg.published;\n    out.isList = st.view === 'list' && cfg.published;\n    out.toggleMine = {\n      onClick: () => this.setState({ onlyMine: !st.onlyMine }),\n      bg: st.onlyMine ? teal : '#D8D4CE',\n      knob: st.onlyMine ? 'translateX(-18px)' : 'translateX(0px)',\n    };\n\n    const selDay = Math.min(st.selDay, cfg.days);\n    const gridCells = [];\n    for (let i = 0; i < cfg.offset; i++) {\n      gridCells.push({ num: '', bg: 'transparent', bd: '1px solid transparent', color: 'transparent', op: '1', dots: [], onClick: () => {} });\n    }\n    days.forEach((d) => {\n      const isSel = d.num === selDay;\n      const isToday = cfg.today === d.num;\n      gridCells.push({\n        num: String(d.num),\n        bg: isSel ? ink : (d.mine ? tealSoft : '#FFFFFF'),\n        color: isSel ? '#FFFFFF' : ink,\n        bd: isSel ? ('1.5px solid ' + ink) : (isToday ? ('2px solid ' + ink) : (d.mine ? ('1.5px solid ' + teal) : '1px solid #E7E4DF')),\n        op: (st.onlyMine && !d.mine && !isSel) ? '0.35' : '1',\n        dots: d.shifts.slice(0, 3).map((s) => ({ c: isSel ? 'rgba(255,255,255,0.85)' : s.dot })),\n        onClick: () => this.setState({ selDay: d.num }),\n      });\n    });\n    out.gridCells = gridCells;\n    const selD = days[selDay - 1];\n    const selShiftsRaw = st.onlyMine ? selD.shifts.filter((s) => s.mine) : selD.shifts;\n    out.selTitle = 'יום ' + selD.dayName + ', ' + selD.num + ' ' + cfg.inMonth + (cfg.today === selD.num ? ' · היום' : '');\n    out.selShifts = selShiftsRaw.map(shiftRow);\n    out.selNone = st.onlyMine && selShiftsRaw.length === 0;\n\n    const maxWeek = Math.floor((cfg.days - 1 + cfg.offset) / 7);\n    const wi = Math.min(st.weekIdx, maxWeek);\n    const dFirst = Math.max(1, wi * 7 - cfg.offset + 1);\n    const dLast = Math.min(cfg.days, wi * 7 - cfg.offset + 7);\n    out.weekLabel = 'שבוע ' + dFirst + '–' + dLast + ' ' + cfg.inMonth;\n    out.onPrevWeek = () => { if (wi > 0) this.setState({ weekIdx: wi - 1, selDay: Math.max(1, (wi - 1) * 7 - cfg.offset + 1) }); };\n    out.onNextWeek = () => { if (wi < maxWeek) this.setState({ weekIdx: wi + 1, selDay: Math.min(cfg.days, (wi + 1) * 7 - cfg.offset + 1) }); };\n    out.prevWeekOp = wi > 0 ? '1' : '0.3';\n    out.nextWeekOp = wi < maxWeek ? '1' : '0.3';\n\n    const letters = ['א׳', 'ב׳', 'ג׳', 'ד׳', 'ה׳', 'ו׳', 'ש׳'];\n    const weekStrip = [];\n    for (let s = 0; s < 7; s++) {\n      const dn = wi * 7 - cfg.offset + 1 + s;\n      if (dn < 1 || dn > cfg.days) {\n        weekStrip.push({ letter: '', num: '', bg: 'transparent', color: 'transparent', bd: '1px solid transparent', dotColor: 'transparent', onClick: () => {} });\n        continue;\n      }\n      const d = days[dn - 1];\n      const act = dn === selDay;\n      weekStrip.push({\n        letter: letters[s],\n        num: String(dn),\n        bg: act ? ink : 'transparent',\n        color: act ? '#FFFFFF' : ink,\n        bd: (cfg.today === dn && !act) ? ('1.5px solid ' + ink) : '1px solid transparent',\n        dotColor: d.mine ? (act ? 'rgba(255,255,255,0.9)' : teal) : 'transparent',\n        onClick: () => this.setState({ selDay: dn }),\n      });\n    }\n    out.weekStrip = weekStrip;\n\n    const weekDays = [];\n    for (let dn = dFirst; dn <= dLast; dn++) {\n      const d = days[dn - 1];\n      const mineShifts = d.shifts.filter((s) => s.mine);\n      const use = st.onlyMine ? mineShifts : d.shifts;\n      const isThin = st.onlyMine && mineShifts.length === 0;\n      const expanded = dn === selDay && !isThin;\n      weekDays.push({\n        head: 'יום ' + d.dayName + ' · ' + dn + ' ' + cfg.inMonth + (cfg.today === dn ? ' · היום' : ''),\n        mineBadge: d.mine,\n        isThin: isThin,\n        expanded: expanded,\n        collapsed: !expanded && !isThin,\n        collapsedChips: use.map((s) => ({ label: s.label, dot: s.dot })),\n        shifts: use.map(shiftRow),\n        bd: expanded ? ('1.5px solid ' + ink) : '1px solid #E7E4DF',\n        onClick: () => this.setState({ selDay: dn }),\n      });\n    }\n    out.weekDays = weekDays;\n\n    // ---------- requests ----------\n    const rCfg = this.MONTHS[st.reqIdx];\n    const req = st.requests[rCfg.key];\n    const editable = !rCfg.published;\n    const STATUS = {\n      un: { bg: 'oklch(0.93 0.06 25)', bd: '1.5px solid oklch(0.62 0.16 25)', fg: 'oklch(0.42 0.16 25)' },\n      high: { bg: 'oklch(0.94 0.06 155)', bd: '1.5px solid oklch(0.6 0.13 155)', fg: 'oklch(0.4 0.12 155)' },\n      can: { bg: 'oklch(0.94 0.05 240)', bd: '1.5px solid oklch(0.6 0.12 240)', fg: 'oklch(0.42 0.12 240)' },\n      none: { bg: '#FFFFFF', bd: '1px solid #E7E4DF', fg: '#3A3631' },\n    };\n\n    out.reqMonthLabel = rCfg.label;\n    out.onReqPrev = () => { if (st.reqIdx > 0) this.setState({ reqIdx: st.reqIdx - 1 }); };\n    out.onReqNext = () => { if (st.reqIdx < 2) this.setState({ reqIdx: st.reqIdx + 1 }); };\n    out.reqPrevOp = st.reqIdx > 0 ? '1' : '0.3';\n    out.reqNextOp = st.reqIdx < 2 ? '1' : '0.3';\n    out.reqOpen = editable;\n    out.reqLocked = !editable;\n\n    const hasMarks = Object.keys(req.marks).length > 0;\n    out.reqHasCal = editable || hasMarks;\n    out.lockedHasNote = !editable && req.note.length > 0;\n    out.lockedNote = req.note;\n    out.lockedSentVisible = !editable && !!req.sentAt;\n    out.lockedSent = req.sentAt ? ('נשלח לאחרונה: ' + req.sentAt) : '';\n    out.lockedEmpty = !editable && !hasMarks && req.note.length === 0;\n\n    const paint = (d) => {\n      const reqs = Object.assign({}, this.state.requests);\n      const r = Object.assign({}, reqs[rCfg.key]);\n      const m = Object.assign({}, r.marks);\n      if (this.state.brush === 'erase') { delete m[d]; } else { m[d] = this.state.brush; }\n      r.marks = m;\n      if (r.sentAt) r.dirty = true;\n      reqs[rCfg.key] = r;\n      this.setState({ requests: reqs });\n    };\n\n    const reqCal = [];\n    for (let i = 0; i < rCfg.offset; i++) {\n      reqCal.push({ num: '', bg: 'transparent', bd: '1px solid transparent', fg: 'transparent', cur: 'default', press: '1', onClick: () => {} });\n    }\n    for (let d = 1; d <= rCfg.days; d++) {\n      const s = STATUS[req.marks[d] || 'none'];\n      reqCal.push({\n        num: String(d),\n        bg: s.bg,\n        bd: s.bd,\n        fg: s.fg,\n        cur: editable ? 'pointer' : 'default',\n        press: editable ? '0.88' : '1',\n        onClick: editable ? (() => paint(d)) : (() => {}),\n      });\n    }\n    out.reqCal = reqCal;\n\n    const vals = Object.keys(req.marks).map((k) => req.marks[k]);\n    const cnt = (x) => vals.filter((y) => y === x).length;\n    out.reqCount = cnt('un') + ' לא זמין · ' + cnt('high') + ' מעדיף · ' + cnt('can') + ' יכול';\n\n    out.brushChips = [\n      { id: 'un', label: 'לא זמינ.ה' },\n      { id: 'high', label: 'מעדיפ.ה' },\n      { id: 'can', label: 'יכול.ה' },\n      { id: 'erase', label: 'מחיקה' },\n    ].map((c) => {\n      const s = c.id === 'erase' ? { bg: '#FFFFFF', bd: '1px solid #D8D4CE', fg: '#6B6760' } : STATUS[c.id];\n      const active = st.brush === c.id;\n      return {\n        label: c.label,\n        bg: s.bg,\n        fg: s.fg,\n        bd: active ? ('2px solid ' + s.fg) : s.bd,\n        shadow: active ? '0 3px 10px rgba(30,28,24,0.16)' : 'none',\n        onClick: () => this.setState({ brush: c.id }),\n      };\n    });\n\n    out.note = req.note;\n    out.onNote = (e) => {\n      const reqs = Object.assign({}, this.state.requests);\n      const r = Object.assign({}, reqs[rCfg.key]);\n      r.note = e.target.value;\n      if (r.sentAt) r.dirty = true;\n      reqs[rCfg.key] = r;\n      this.setState({ requests: reqs });\n    };\n\n    const needSend = !req.sentAt || req.dirty;\n    out.submitBtn = needSend\n      ? { label: req.sentAt ? 'שליחת עדכון' : 'שליחת בקשות', bg: ink, color: '#FFFFFF', bd: '1.5px solid ' + ink }\n      : { label: 'הבקשות נשלחו ✓', bg: '#FFFFFF', color: tealDark, bd: '1.5px solid ' + teal };\n    out.onSubmit = () => {\n      if (!needSend) return;\n      const t = new Date();\n      const hh = String(t.getHours()).padStart(2, '0');\n      const mm = String(t.getMinutes()).padStart(2, '0');\n      const reqs = Object.assign({}, this.state.requests);\n      const r = Object.assign({}, reqs[rCfg.key]);\n      r.sentAt = 'היום, ' + hh + ':' + mm;\n      r.dirty = false;\n      reqs[rCfg.key] = r;\n      this.setState({ requests: reqs });\n    };\n    out.sentLineVisible = !!req.sentAt;\n    out.sentLine = req.sentAt ? ('עודכן לאחרונה: ' + req.sentAt + (req.dirty ? ' · יש שינויים שטרם נשלחו' : '')) : '';\n\n    return out;\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
