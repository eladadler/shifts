const HEB_DAYS = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];
const HEB_MONTHS = ['ינואר', 'פברואר', 'מרץ', 'אפריל', 'מאי', 'יוני', 'יולי', 'אוגוסט', 'ספטמבר', 'אוקטובר', 'נובמבר', 'דצמבר'];

const weekdayOf = (s) => parseDate(s).getDay();

/* ============ הגדרות משמרות — אותה לוגיקה כמו אצל המשבץ ============ */
const WEEKDAY_SHIFTS = [
  { id: 'morning', name: 'בוקר', start: '07:00', end: '15:00' },
  { id: 'evening', name: 'ערב', start: '15:00', end: '23:00' },
  { id: 'night', name: 'לילה', start: '23:00', end: '07:00' },
];
const WEEKEND_SHIFTS = [
  { id: 'morning', name: 'בוקר', start: '07:00', end: '15:00' },
  { id: 'short', name: 'קצר', start: '15:00', end: '19:00' },
  { id: 'night', name: 'לילה', start: '19:00', end: '07:00' },
];
const getBase = (dayStr, settings) => {
  const wd = weekdayOf(dayStr);
  if (settings) {
    if (wd === 6) return settings.saturday || settings.weekend || WEEKEND_SHIFTS;
    if (wd === 5) return settings.friday || settings.weekend || WEEKEND_SHIFTS;
    return settings.weekday || WEEKDAY_SHIFTS;
  }
  return (wd === 5 || wd === 6) ? WEEKEND_SHIFTS : WEEKDAY_SHIFTS;
};
// זהה ללוגיקה של המשבץ: משמרת מיוחדת (חג/זמנית) מחליפה את משמרות הבסיס ביום שלה
// ובימי ההמשך שלה (daysSpan), ומשמרות בסיס רב-יומיות מסומנות כהמשך בימים הבאים
const shiftTypesFor = (s, settings) => {
  const special = settings?.special || [];
  const directSpecial = special.filter(sp => sp.date === s);
  const contSpecial = [];
  special.forEach(sp => {
    const span = sp.daysSpan || 1;
    for (let i = 1; i < span; i++) {
      if (addDays(sp.date, i) === s) contSpecial.push({ ...sp, continuation: true, originDate: sp.date });
    }
  });
  if (directSpecial.length || contSpecial.length) return [...directSpecial, ...contSpecial];
  const base = getBase(s, settings);
  const contRegular = [];
  for (let i = 1; i <= 2; i++) {
    const prev = addDays(s, -i);
    getBase(prev, settings).filter(sh => (sh.daysSpan || 1) > i).forEach(sh => {
      if (!contRegular.find(c => c.id === sh.id && c.originDate === prev)) {
        contRegular.push({ ...sh, continuation: true, originDate: prev });
      }
    });
  }
  return [...base, ...contRegular];
};
const shortDate = (s) => { const d = parseDate(s); return `${d.getDate()}/${d.getMonth() + 1}`; };
const shiftDefOf = (s, shiftId, settings) => {
  const direct = shiftTypesFor(s, settings).find(x => x.id === shiftId);
  if (direct) return direct;
  // משמרת מיוחדת/רגילה שמתחילה ביום אחר (המשך) — חיפוש בהגדרות
  const special = (settings?.special || []).find(sp => sp.id === shiftId);
  return special || null;
};

  short: 'oklch(0.68 0.11 160)', night: 'oklch(0.45 0.09 290)',
};
const EXTRA_DOTS = ['oklch(0.62 0.14 25)', 'oklch(0.62 0.14 330)', 'oklch(0.62 0.14 130)'];
const dotOf = (id) => DOTS[id] || EXTRA_DOTS[Math.abs([...String(id)].reduce((a, c) => a + c.charCodeAt(0), 0)) % EXTRA_DOTS.length];

const fmtSentAt = (iso) => {
  if (!iso) return null;
  const d = new Date(iso);
  const t = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  const today = new Date();
  if (d.toDateString() === today.toDateString()) return `היום, ${t}`;
  return `${d.getDate()} ${HEB_MONTHS[d.getMonth()]}, ${t}`;
};

/* ============ פירוק סידור שפורסם לימי-תצוגה ============ */
function buildMonthDays(ym, pubRow, myId, empNames) {
  const settings = pubRow?.shift_settings || null;
  const schedule = pubRow?.schedule || {};
  const days = [];
  const n = daysInMonth(ym);
  for (let d = 1; d <= n; d++) {
    const ds = `${ym}-${pad(d)}`;
    const dow = weekdayOf(ds);
    const baseOrder = shiftTypesFor(ds, settings).map(x => x.id);
    const dayData = schedule[ds] || {};
    const ids = Object.keys(dayData).sort((a, b) => {
      const ia = baseOrder.indexOf(a), ib = baseOrder.indexOf(b);
      return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
    });
    const shifts = ids.map(id => {
      const def = shiftDefOf(ds, id, settings);
      const people = dayData[id] || [];
      const special = !!(def && (def.date || (def.daysSpan || 1) > 1)) || !DOTS[id];
      return {
        id,
        label: def?.name || id,
        time: def ? `${def.start}–${def.end}` : '',
        dot: dotOf(id),
        people,
        mine: people.includes(myId),
        special,
      };
    }).filter(sh => sh.people.length > 0);
    const mineShift = shifts.find(s => s.mine) || null;
    days.push({ num: d, ds, dow, dayName: HEB_DAYS[dow], shifts, mine: !!mineShift });
  }
  return days;
}

/* ============ קביעת סיסמה חדשה (לאחר קישור איפוס) ============ */
function NewPasswordScreen({ onDone }) {
  const [pw, setPw] = React.useState('');
  const [busy, setBusy] = React.useState(false);
  const [err, setErr] = React.useState(null);
  const save = async () => {
    if (pw.length < 6) { setErr('הסיסמה צריכה להכיל לפחות 6 תווים'); return; }
    setBusy(true);
    const { error } = await sb.auth.updateUser({ password: pw });
    setBusy(false);
    if (error) setErr(error.message); else onDone();
  };
  return (
    <div style={{ flex: 1, padding: '76px 30px', display: 'flex', flexDirection: 'column', gap: 16 }}>
      <div style={{ fontSize: 26, fontWeight: 900 }}>בחירת סיסמה חדשה</div>
      <input type="password" placeholder="סיסמה חדשה" value={pw} onChange={e => { setPw(e.target.value); setErr(null); }}
        style={{ border: `1.5px solid ${INK}`, borderRadius: 8, padding: '13px 14px', fontSize: 15 }} />
      {err && <span style={{ fontSize: 13, fontWeight: 600, color: 'oklch(0.5 0.18 25)' }}>{err}</span>}
      <div onClick={save} style={{ background: INK, color: '#FFF', borderRadius: 8, padding: '14px 0', textAlign: 'center', fontSize: 15, fontWeight: 800, cursor: 'pointer', opacity: busy ? 0.6 : 1 }}>שמירה והמשך</div>
    </div>
  );
}

/* ============ האפליקציה הראשית ============ */
function App() {
  const [session, setSession] = React.useState(undefined);   // undefined=בטעינה, null=לא מחובר
  const [recovery, setRecovery] = React.useState(false);
  const [me, setMe] = React.useState(null);                  // רשומת העובד מ-app_employees
  const [meStatus, setMeStatus] = React.useState('loading'); // loading | ok | notfound | error
  const [published, setPublished] = React.useState({});      // { 'YYYY-MM': row }
  const [globalSettings, setGlobalSettings] = React.useState(null); // הגדרות משמרות עדכניות מהמשבץ

  const [serverReqs, setServerReqs] = React.useState({});    // { 'YYYY-MM': row } — הבקשות שלי מהשרת
  const [localReqs, setLocalReqs] = React.useState({});      // { 'YYYY-MM': { marks, note, dirty } }
  const [tab, setTab] = React.useState('home');
  const [menuOpen, setMenuOpen] = React.useState(false);
  const [toast, setToast] = React.useState(null);

  const TM = thisMonth();

  /* --- session --- */
  React.useEffect(() => {
    sb.auth.getSession().then(({ data }) => setSession(data.session ?? null));
    const { data: sub } = sb.auth.onAuthStateChange((event, s) => {
      if (event === 'PASSWORD_RECOVERY') setRecovery(true);
      setSession(s ?? null);
    });
    return () => sub.subscription.unsubscribe();
  }, []);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3500); };

  /* --- טעינת נתונים --- */
  const loadAll = React.useCallback(async (email) => {
    try {
      const { data: emps, error: e1 } = await sb.from('app_employees').select('*');
      if (e1) throw e1;
      const mine = (emps || []).find(x => (x.email || '').trim().toLowerCase() === email.trim().toLowerCase());
      if (!mine) { setMeStatus('notfound'); return; }
      setMe({ ...mine, allEmployees: emps });
      setMeStatus('ok');

      const [{ data: pubs, error: e2 }, { data: reqs, error: e3 }, settingsRes] = await Promise.all([
        sb.from('published_schedules').select('*'),
        sb.from('employee_requests').select('*').eq('emp_id', mine.id),
        sb.from('mishmarot_state').select('data').eq('id', 'main').maybeSingle(),
      ]);
      if (e2) throw e2;
      if (e3) throw e3;
      // הגדרות המשמרות + מפתח Anthropic (נשמר ע"י המשבץ)
      const stateData = settingsRes?.data?.data || {};
      setGlobalSettings(stateData.shiftSettings || null);
      setAnthropicKey(prev => prev || stateData.anthropicKey || '');
      const pubMap = {};
      (pubs || []).forEach(r => { pubMap[r.month] = r; });
      setPublished(pubMap);
      const reqMap = {};
      (reqs || []).forEach(r => { reqMap[r.month] = r; });
      setServerReqs(reqMap);
      // אתחול עריכות מקומיות מהשרת — בלי לדרוס שינויים שטרם נשלחו.
      // ערך "YYYY-MM-DD" = יום שלם (marks[day] מחרוזת), "YYYY-MM-DD@shiftId" = משמרת (marks[day] אובייקט)
      setLocalReqs(prev => {
        const next = { ...prev };
        Object.entries(reqMap).forEach(([m, r]) => {
          if (next[m]?.dirty) return;
          const marks = {};
          [['unavailable', 'un'], ['high', 'high'], ['can', 'can']].forEach(([key, mark]) => {
            (r[key] || []).forEach(entry => {
              const at = entry.indexOf('@');
              const ds = at === -1 ? entry : entry.slice(0, at);
              const sid = at === -1 ? null : entry.slice(at + 1);
              if (!ds) return;
              if (sid) {
                if (typeof marks[ds] !== 'object' || !marks[ds]) marks[ds] = {};
                marks[ds][sid] = mark;
              } else {
                marks[ds] = mark;
              }
            });
          });
          next[m] = { marks, note: r.note || '', dirty: false };
        });
        return next;
      });
    } catch (err) {
      console.error(err);
      setMeStatus('error');
    }
  }, []);

  React.useEffect(() => {
    if (!session?.user?.email) return;
    setMeStatus('loading');
    loadAll(session.user.email);
  }, [session?.user?.email, loadAll]);

  // רענון כשהאפליקציה חוזרת לפוקוס (סידור חדש פורסם וכו')
  React.useEffect(() => {
    const onVis = () => { if (document.visibilityState === 'visible' && session?.user?.email && meStatus === 'ok') loadAll(session.user.email); };
    document.addEventListener('visibilitychange', onVis);
    return () => document.removeEventListener('visibilitychange', onVis);
  }, [session, meStatus, loadAll]);

  const logout = async () => { await sb.auth.signOut(); setMe(null); setMeStatus('loading'); setMenuOpen(false); setTab('home'); };

  /* --- מסכי קצה --- */
  const frame = (children) => (
    <div style={{ minHeight: '100vh', background: '#E9E7E2', display: 'flex', justifyContent: 'center' }}>
      <div style={{ width: '100%', maxWidth: 430, background: '#FFFFFF', minHeight: '100vh', display: 'flex', flexDirection: 'column', position: 'relative',
        boxShadow: '0 0 0 1px #DCD9D3, 0 24px 60px rgba(30,28,24,0.12)', overflow: 'hidden' }}>
        {children}
        {toast && (
          <div style={{ position: 'fixed', bottom: 84, left: '50%', transform: 'translateX(-50%)', background: INK, color: '#FFF', borderRadius: 10,
            padding: '10px 18px', fontSize: 13, fontWeight: 700, zIndex: 100, animation: 'popIn 0.2s', maxWidth: 340, textAlign: 'center' }}>{toast}</div>
        )}
      </div>
    </div>
  );

  if (session === undefined) {
    return frame(<div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Spinner /></div>);
  }
  if (recovery && session) {
    return frame(<NewPasswordScreen onDone={() => { setRecovery(false); showToast('הסיסמה עודכנה ✓'); }} />);
  }
  if (!session) return frame(<LoginScreen />);

  if (meStatus === 'loading') {
    return frame(<div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 14 }}>
      <Spinner /><span style={{ fontSize: 13, color: '#8A867F' }}>טוען את הנתונים שלך…</span>
    </div>);
  }
  if (meStatus === 'notfound' || meStatus === 'error') {
    return frame(
      <div style={{ flex: 1, padding: '76px 30px', display: 'flex', flexDirection: 'column', gap: 14, textAlign: 'center', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ width: 58, height: 58, borderRadius: 14, background: '#F1EFEB', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 26, fontWeight: 900, color: '#A09C94' }}>!</div>
        {meStatus === 'notfound' ? (<>
          <div style={{ fontSize: 17, fontWeight: 800 }}>החשבון לא משויך לעובד</div>
          <div style={{ fontSize: 14, color: '#6B6760', lineHeight: 1.6 }}>
            התחברת בתור <b style={{ direction: 'ltr', unicodeBidi: 'embed' }}>{session.user.email}</b>, אבל הכתובת הזו לא מופיעה אצל אף עובד במערכת.<br />
            בקשו מהמנהל להזין את האימייל הזה בכרטיס העובד שלכם (מסך עובדים ← עריכה).
          </div>
        </>) : (<>
          <div style={{ fontSize: 17, fontWeight: 800 }}>לא הצלחנו לטעון את הנתונים</div>
          <div style={{ fontSize: 14, color: '#6B6760', lineHeight: 1.6 }}>ייתכן שהמערכת עדיין לא הוקמה (טבלאות Supabase חסרות) או שיש בעיית רשת. נסו שוב מאוחר יותר.</div>
        </>)}
        <div style={{ display: 'flex', gap: 10, marginTop: 8 }}>
          <div onClick={() => loadAll(session.user.email)} style={{ background: INK, color: '#FFF', borderRadius: 8, padding: '11px 20px', fontSize: 14, fontWeight: 800, cursor: 'pointer' }}>נסו שוב</div>
          <div onClick={logout} style={{ background: '#FFF', border: `1.5px solid ${INK}`, borderRadius: 8, padding: '11px 20px', fontSize: 14, fontWeight: 800, cursor: 'pointer' }}>התנתקות</div>
        </div>
      </div>
    );
  }

  /* --- נתונים מחושבים --- */
  const empNames = {};
  (me.allEmployees || []).forEach(e => { empNames[e.id] = e.name; });
  Object.values(published).forEach(p => (p.employees || []).forEach(e => { if (!empNames[e.id]) empNames[e.id] = e.name; }));

  const firstName = (me.name || '').split(' ')[0];

  return frame(
    <Shell me={me} firstName={firstName} email={session.user.email} menuOpen={menuOpen} setMenuOpen={setMenuOpen} onLogout={logout}
      tab={tab} setTab={setTab}>
      {tab === 'home' && <HomeTab me={me} empNames={empNames} published={published} TM={TM} goSched={() => setTab('schedule')} goReq={() => setTab('requests')} />}
      {tab === 'schedule' && <ScheduleTab me={me} empNames={empNames} published={published} TM={TM} serverReqs={serverReqs} goReq={() => setTab('requests')} />}
      {tab === 'requests' && <RequestsTab me={me} email={session.user.email} published={published} TM={TM} globalSettings={globalSettings}
        serverReqs={serverReqs} setServerReqs={setServerReqs} localReqs={localReqs} setLocalReqs={setLocalReqs} showToast={showToast} anthropicKey={anthropicKey} />}
    </Shell>
  );
}

/* ============ מעטפת: כותרת + טאבים ============ */
function Shell({ me, firstName, email, menuOpen, setMenuOpen, onLogout, tab, setTab, children }) {
  const tabStyle = (active) => ({
    padding: '13px 0 17px', textAlign: 'center', fontSize: 13, fontWeight: active ? 800 : 500,
    color: active ? INK : '#8A867F', borderTop: `3px solid ${active ? TEAL : 'transparent'}`, marginTop: -1.5, cursor: 'pointer', transition: 'color 0.15s',
  });
  return (<>
    <div style={{ padding: '13px 18px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', borderBottom: `1.5px solid ${INK}`, position: 'relative', background: '#FFF', flexShrink: 0 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
        <div style={{ width: 28, height: 28, borderRadius: 7, background: INK, color: '#FFF', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, fontWeight: 900 }}>מ</div>
        <div style={{ fontSize: 14, fontWeight: 800, whiteSpace: 'nowrap' }}>משמרות המהפכה</div>
      </div>
      <div onClick={() => setMenuOpen(o => !o)} style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', padding: '4px 8px', borderRadius: 8 }}>
        <span style={{ fontSize: 13, fontWeight: 700 }}>{me.name}</span>
        <div style={{ width: 30, height: 30, borderRadius: '50%', background: TEAL_SOFT, color: TEAL_DARK, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: 14 }}>
          {(firstName || '?')[0]}
        </div>
      </div>
      {menuOpen && (
        <div style={{ position: 'absolute', top: 52, left: 14, background: '#FFF', border: `1.5px solid ${INK}`, borderRadius: 10, boxShadow: '0 12px 28px rgba(0,0,0,0.14)', zIndex: 30, overflow: 'hidden', minWidth: 180 }}>
          <div style={{ padding: '11px 16px', fontSize: 12, color: '#8A867F', borderBottom: '1px solid #EFEDE9', direction: 'ltr', textAlign: 'right' }}>{email}</div>
          <div onClick={onLogout} style={{ padding: '12px 16px', fontSize: 14, fontWeight: 800, cursor: 'pointer', color: 'oklch(0.5 0.18 25)' }}>התנתקות</div>
        </div>
      )}
    </div>
    <div style={{ flex: 1, overflowY: 'auto', background: '#FAF9F7' }} onClick={() => menuOpen && setMenuOpen(false)}>
      {children}
    </div>
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', borderTop: `1.5px solid ${INK}`, background: '#FFF', flexShrink: 0 }}>
      <div onClick={() => { setTab('home'); setMenuOpen(false); }} style={tabStyle(tab === 'home')}>הבית</div>
      <div onClick={() => { setTab('schedule'); setMenuOpen(false); }} style={tabStyle(tab === 'schedule')}>הסידור</div>
      <div onClick={() => { setTab('requests'); setMenuOpen(false); }} style={tabStyle(tab === 'requests')}>הגשת בקשות</div>
    </div>
  </>);
}

/* ============ טאב הבית ============ */
function HomeTab({ me, empNames, published, TM, goSched, goReq }) {
  const today = todayStr();
  const relOf = (off) => off === 0 ? 'היום' : off === 1 ? 'מחר' : `בעוד ${off} ימים`;

  // כל המשמרות שלי מהיום והלאה, מכל החודשים שפורסמו
  const upcoming = [];
  Object.keys(published).sort().forEach(ym => {
    if (ym < TM) return;
    const days = buildMonthDays(ym, published[ym], me.id, empNames);
    days.forEach(d => {
      if (d.ds < today) return;
      d.shifts.filter(s => s.mine).forEach(sh => {
        upcoming.push({ ym, d, sh, off: diffDays(today, d.ds) });
      });
    });
  });
  upcoming.sort((a, b) => a.off - b.off);
  const hero = upcoming[0] || null;
  const firstName = (me.name || '').split(' ')[0];

  // הגשת בקשות פתוחה לחודש שטרם פורסם סופית (כולל "פתוח לבקשות")
  const isReqOpen = (m) => !published[m] || published[m]?.shift_settings?._status === 'open';
  const openReqMonth = [addMonths(TM, 1), addMonths(TM, 2)].find(isReqOpen) || (isReqOpen(TM) ? TM : null);

  return (
    <div style={{ padding: '16px 16px 24px', display: 'flex', flexDirection: 'column', gap: 14, animation: 'fadeIn 0.25s' }}>
      <div style={{ fontSize: 24, fontWeight: 900 }}>שלום, {firstName}</div>

      {hero ? (
        <div style={{ background: INK, color: '#FFF', borderRadius: 18, padding: 20, display: 'flex', flexDirection: 'column', gap: 11, boxShadow: '0 12px 26px rgba(28,26,23,0.18)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ fontSize: 12, fontWeight: 800, color: 'color-mix(in oklab, #41ABC3 45%, white)', letterSpacing: '0.04em', whiteSpace: 'nowrap' }}>המשמרת הקרובה שלך</span>
            <span style={{ fontSize: 12, fontWeight: 800, background: TEAL, color: '#FFF', borderRadius: 999, padding: '4px 12px' }}>{relOf(hero.off)}</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 10 }}>
            <span style={{ width: 10, height: 10, borderRadius: '50%', background: hero.sh.dot, flexShrink: 0 }} />
            <span style={{ fontSize: 34, fontWeight: 900, lineHeight: 1 }}>{hero.sh.label}</span>
            <span style={{ fontSize: 18, fontWeight: 700, color: 'rgba(255,255,255,0.85)', whiteSpace: 'nowrap' }}>{hero.sh.time}</span>
          </div>
          <div style={{ fontSize: 14, color: 'rgba(255,255,255,0.75)' }}>יום {hero.d.dayName}, {hero.d.num} {inMonthLabel(hero.ym)}</div>
          <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.6)', borderTop: '1px solid rgba(255,255,255,0.16)', paddingTop: 10 }}>
            {(() => { const mates = hero.sh.people.filter(p => p !== me.id).map(p => empNames[p] || p);
              return mates.length ? 'יחד עם: ' + mates.join(', ') : 'משמרת יחיד — אתם לבד במשמרת זו'; })()}
          </div>
        </div>
      ) : (
        <div style={{ background: INK, color: '#FFF', borderRadius: 18, padding: 20, display: 'flex', flexDirection: 'column', gap: 8 }}>
          <span style={{ fontSize: 12, fontWeight: 800, color: 'color-mix(in oklab, #41ABC3 45%, white)' }}>המשמרת הקרובה שלך</span>
          <span style={{ fontSize: 18, fontWeight: 800 }}>אין משמרות קרובות בסידור שפורסם</span>
        </div>
      )}

      {openReqMonth && (
        <div style={{ background: TEAL_SOFT, border: '1px solid color-mix(in oklab, #41ABC3 30%, white)', borderRadius: 12, padding: '12px 14px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10 }}>
          <span style={{ fontSize: 13, fontWeight: 700, color: 'color-mix(in oklab, #41ABC3 60%, black)' }}>הגשת הבקשות ל{monthName(openReqMonth)} פתוחה</span>
          <span onClick={goReq} style={{ fontSize: 13, fontWeight: 800, color: TEAL_DARK, cursor: 'pointer', flexShrink: 0 }}>להגשה ←</span>
        </div>
      )}

      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 4 }}>
        <div style={{ fontSize: 15, fontWeight: 900 }}>המשמרות הבאות שלך</div>
        <div onClick={goSched} style={{ fontSize: 13, fontWeight: 700, color: TEAL_DARK, cursor: 'pointer', textDecoration: 'underline', textUnderlineOffset: 3 }}>לסידור המלא</div>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {upcoming.slice(1, 6).map((u, i) => (
          <div key={i} style={{ background: '#FFF', border: '1px solid #EAE7E1', borderRadius: 12, padding: '12px 14px', display: 'flex', alignItems: 'center', gap: 12 }}>
            <div style={{ width: 44, height: 44, borderRadius: 10, background: '#F1EFEB', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', flexShrink: 0, gap: 1 }}>
              <span style={{ fontSize: 16, fontWeight: 900, lineHeight: 1 }}>{u.d.num}</span>
              <span style={{ fontSize: 10, fontWeight: 700, color: '#8A867F' }}>{monthName(u.ym)}</span>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 2, flex: 1 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <span style={{ width: 7, height: 7, borderRadius: '50%', background: u.sh.dot }} />
                <span style={{ fontSize: 14, fontWeight: 800 }}>{u.sh.label}</span>
                <span style={{ fontSize: 12, color: '#8A867F' }}>{u.sh.time}</span>
              </div>
              <div style={{ fontSize: 12, color: '#8A867F' }}>יום {u.d.dayName}</div>
            </div>
            <div style={{ fontSize: 12, fontWeight: 700, color: '#56524C', flexShrink: 0 }}>{relOf(u.off)}</div>
          </div>
        ))}
        {upcoming.length <= 1 && <div style={{ padding: '20px 0', textAlign: 'center', fontSize: 13, color: '#8A867F' }}>אין משמרות נוספות בסידורים שפורסמו.</div>}
      </div>
    </div>
  );
}

/* ============ טאב הסידור ============ */
function ScheduleTab({ me, empNames, published, TM, serverReqs, goReq }) {
  const months = React.useMemo(() => {
    const set = new Set([TM, addMonths(TM, 1), ...Object.keys(published)]);
    return [...set].sort();
  }, [published, TM]);
  const [mi, setMi] = React.useState(() => Math.max(0, months.indexOf(TM)));
  const [view, setView] = React.useState('grid');
  const [onlyMine, setOnlyMine] = React.useState(false);
  const ym = months[Math.min(mi, months.length - 1)];
  const pub = published[ym] || null;
  const today = todayStr();
  const todayNum = ym === TM ? Number(today.split('-')[2]) : null;

  const days = React.useMemo(() => pub ? buildMonthDays(ym, pub, me.id, empNames) : [], [pub, ym, me.id]);
  const unavailableArr = (serverReqs[ym] || {}).unavailable || [];
  const isUnavailable = (ds, shiftId) => unavailableArr.some(v => v === ds || v === ds + '@' + shiftId);
  const [selDay, setSelDay] = React.useState(todayNum || 1);
  const [weekIdx, setWeekIdx] = React.useState(() => Math.floor(((todayNum || 1) - 1 + monthOffset(ym)) / 7));

  const gotoMonth = (idx) => {
    const m = months[idx];
    const sel = (m === TM ? Number(today.split('-')[2]) : 1);
    setMi(idx); setSelDay(sel); setWeekIdx(Math.floor((sel - 1 + monthOffset(m)) / 7));
  };

  const offset = monthOffset(ym);
  const nDays = daysInMonth(ym);
  const sel = Math.min(selDay, nDays);

  const myCount = days.filter(d => d.mine).length;
  const nightCount = days.reduce((a, d) => a + d.shifts.filter(s => s.mine && s.id === 'night').length, 0);

  const letters = ['א׳', 'ב׳', 'ג׳', 'ד׳', 'ה׳', 'ו׳', 'ש׳'];
  const maxWeek = Math.floor((nDays - 1 + offset) / 7);
  const wi = Math.min(weekIdx, maxWeek);
  const dFirst = Math.max(1, wi * 7 - offset + 1);
  const dLast = Math.min(nDays, wi * 7 - offset + 7);

  return (
    <div style={{ padding: '16px 16px 24px', display: 'flex', flexDirection: 'column', gap: 12, animation: 'fadeIn 0.25s' }}>
      <div style={{ fontSize: 24, fontWeight: 900 }}>הסידור</div>
      <MonthSwitcher label={monthLabel(ym)} canPrev={mi > 0} canNext={mi < months.length - 1}
        onPrev={() => gotoMonth(mi - 1)} onNext={() => gotoMonth(mi + 1)} />

      {!pub ? (
        <div style={{ padding: '56px 24px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12, textAlign: 'center' }}>
          <div style={{ width: 58, height: 58, borderRadius: 14, background: '#F1EFEB', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 26, fontWeight: 900, color: '#A09C94' }}>?</div>
          <div style={{ fontSize: 17, fontWeight: 800 }}>הסידור ל{monthLabel(ym)} טרם פורסם</div>
          <div style={{ fontSize: 14, color: '#6B6760', lineHeight: 1.6, maxWidth: 280 }}>ברגע שהמנהל יפרסם את הסידור, הוא יופיע כאן.</div>
          <div onClick={goReq} style={{ marginTop: 8, background: INK, color: '#FFF', borderRadius: 8, padding: '12px 22px', fontSize: 14, fontWeight: 800, cursor: 'pointer' }}>
            להגשת בקשות ל{monthName(ym)}
          </div>
        </div>
      ) : (<>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div style={{ display: 'flex', background: '#F1EFEB', borderRadius: 10, padding: 3 }}>
            {[['grid', 'לוח'], ['list', 'רשימה']].map(([v, label]) => (
              <div key={v} onClick={() => setView(v)} style={{ padding: '7px 16px', borderRadius: 8, fontSize: 13, fontWeight: 800, cursor: 'pointer',
                background: view === v ? INK : 'transparent', color: view === v ? '#FFF' : '#8A867F', transition: 'background 0.15s, color 0.15s' }}>{label}</div>
            ))}
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={{ fontSize: 12, fontWeight: 700, color: '#56524C' }}>רק שלי</span>
            <div onClick={() => setOnlyMine(o => !o)} style={{ width: 42, height: 24, borderRadius: 999, background: onlyMine ? TEAL : '#D8D4CE', position: 'relative', cursor: 'pointer', transition: 'background 0.2s' }}>
              <div style={{ position: 'absolute', top: 2, right: 2, width: 20, height: 20, borderRadius: '50%', background: '#FFF', boxShadow: '0 1px 3px rgba(0,0,0,0.3)',
                transform: onlyMine ? 'translateX(-18px)' : 'translateX(0)', transition: 'transform 0.2s' }} />
            </div>
          </div>
        </div>
        <div style={{ alignSelf: 'flex-start', fontSize: 12, fontWeight: 800, color: TEAL_DARK, background: TEAL_SOFT, borderRadius: 999, padding: '5px 12px' }}>
          {myCount} משמרות החודש · {nightCount === 1 ? 'לילה אחד' : `${nightCount} לילות`}
        </div>

        {view === 'grid' && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 5 }}>
              {['א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ש'].map(l => <div key={l} style={{ textAlign: 'center', fontSize: 11, fontWeight: 700, color: '#A09C94' }}>{l}</div>)}
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 5 }}>
              {Array.from({ length: offset }).map((_, i) => <div key={'pad' + i} />)}
              {days.map(d => {
                const isSel = d.num === sel;
                const isToday = todayNum === d.num;
                return (
                  <div key={d.num} onClick={() => setSelDay(d.num)} style={{ aspectRatio: '0.92', borderRadius: 10,
                    background: isSel ? INK : (d.mine ? TEAL_SOFT : '#FFF'), color: isSel ? '#FFF' : INK,
                    border: isSel ? `1.5px solid ${INK}` : (isToday ? `2px solid ${INK}` : (d.mine ? `1.5px solid ${TEAL}` : '1px solid #E7E4DF')),
                    opacity: (onlyMine && !d.mine && !isSel) ? 0.35 : 1,
                    display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 4, cursor: 'pointer',
                    transition: 'background 0.15s, opacity 0.2s' }}>
                    <div style={{ fontSize: 13, fontWeight: 700 }}>{d.num}</div>
                    <div style={{ display: 'flex', gap: 3 }}>
                      {d.shifts.slice(0, 3).map((s, i) => <span key={i} style={{ width: 5, height: 5, borderRadius: '50%', background: isSel ? 'rgba(255,255,255,0.85)' : s.dot }} />)}
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{ background: '#FFF', borderRadius: 14, border: '1px solid #EAE7E1', padding: 14, display: 'flex', flexDirection: 'column', gap: 9 }}>
              {(() => {
                const d = days[sel - 1];
                if (!d) return null;
                const use = onlyMine ? d.shifts.filter(s => s.mine) : d.shifts;
                return (<>
                  <div style={{ fontSize: 14, fontWeight: 900 }}>יום {d.dayName}, {d.num} {inMonthLabel(ym)}{todayNum === d.num ? ' · היום' : ''}</div>
                  {use.length === 0 && <div style={{ fontSize: 13, color: '#8A867F' }}>{onlyMine ? 'אין לך משמרות ביום זה.' : 'אין משמרות ביום זה.'}</div>}
                  {use.map((sh, i) => <ShiftRow key={i} sh={sh} myId={me.id} empNames={empNames} blocked={isUnavailable(d.ds, sh.id)} />)}
                </>);
              })()}
            </div>
          </div>
        )}

        {view === 'list' && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <div style={{ fontSize: 14, fontWeight: 800 }}>שבוע {dFirst}–{dLast} {inMonthLabel(ym)}</div>
              <div style={{ display: 'flex', gap: 6 }}>
                <div onClick={() => wi > 0 && (setWeekIdx(wi - 1), setSelDay(Math.max(1, (wi - 1) * 7 - offset + 1)))}
                  style={{ width: 28, height: 28, borderRadius: 8, background: '#F1EFEB', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, cursor: 'pointer', opacity: wi > 0 ? 1 : 0.3 }}>›</div>
                <div onClick={() => wi < maxWeek && (setWeekIdx(wi + 1), setSelDay(Math.min(nDays, (wi + 1) * 7 - offset + 1)))}
                  style={{ width: 28, height: 28, borderRadius: 8, background: '#F1EFEB', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, cursor: 'pointer', opacity: wi < maxWeek ? 1 : 0.3 }}>‹</div>
              </div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 5 }}>
              {Array.from({ length: 7 }).map((_, s) => {
                const dn = wi * 7 - offset + 1 + s;
                if (dn < 1 || dn > nDays) return <div key={s} />;
                const d = days[dn - 1];
                const act = dn === sel;
                return (
                  <div key={s} onClick={() => setSelDay(dn)} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, padding: '8px 0 7px', borderRadius: 11,
                    background: act ? INK : 'transparent', color: act ? '#FFF' : INK,
                    border: (todayNum === dn && !act) ? `1.5px solid ${INK}` : '1px solid transparent', cursor: 'pointer' }}>
                    <div style={{ fontSize: 10, fontWeight: 600, opacity: 0.75 }}>{letters[s]}</div>
                    <div style={{ fontSize: 15, fontWeight: 800 }}>{dn}</div>
                    <div style={{ width: 5, height: 5, borderRadius: '50%', background: d.mine ? (act ? 'rgba(255,255,255,0.9)' : TEAL) : 'transparent' }} />
                  </div>
                );
              })}
            </div>
            {Array.from({ length: dLast - dFirst + 1 }).map((_, i) => {
              const dn = dFirst + i;
              const d = days[dn - 1];
              const mineShifts = d.shifts.filter(s => s.mine);
              const use = onlyMine ? mineShifts : d.shifts;
              const isThin = onlyMine && mineShifts.length === 0;
              const expanded = dn === sel && !isThin;
              return (
                <div key={dn} onClick={() => setSelDay(dn)} style={{ background: '#FFF', borderRadius: 14, border: expanded ? `1.5px solid ${INK}` : '1px solid #E7E4DF', padding: 13,
                  display: 'flex', flexDirection: 'column', gap: 9, cursor: 'pointer', transition: 'border 0.15s' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                    <div style={{ fontSize: 14, fontWeight: 800 }}>יום {d.dayName} · {dn} {inMonthLabel(ym)}{todayNum === dn ? ' · היום' : ''}</div>
                    {d.mine && <span style={{ fontSize: 11, fontWeight: 800, color: '#FFF', background: TEAL, borderRadius: 999, padding: '3px 9px' }}>משמרת שלך</span>}
                  </div>
                  {isThin && <div style={{ fontSize: 12, color: '#A09C94' }}>אין משמרות שלך ביום זה</div>}
                  {!expanded && !isThin && (
                    <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                      {use.map((s, j) => (
                        <span key={j} style={{ display: 'flex', alignItems: 'center', gap: 5, padding: '4px 10px', borderRadius: 999, background: '#F4F2EE', fontSize: 11, fontWeight: 600, color: '#56524C' }}>
                          <span style={{ width: 5, height: 5, borderRadius: '50%', background: s.dot }} />{s.label}
                        </span>
                      ))}
                      {use.length === 0 && <span style={{ fontSize: 12, color: '#A09C94' }}>אין משמרות</span>}
                    </div>
                  )}
                  {expanded && use.map((sh, j) => <ShiftRow key={j} sh={sh} myId={me.id} empNames={empNames} blocked={isUnavailable(d.ds, sh.id)} />)}
                </div>
              );
            })}
          </div>
        )}
      </>)}
    </div>
  );
}

/* ============ טאב הגשת בקשות ============ */
function RequestsTab({ me, email, published, TM, globalSettings, serverReqs, setServerReqs, localReqs, setLocalReqs, showToast, anthropicKey }) {
  const months = React.useMemo(() => [addMonths(TM, -1), TM, addMonths(TM, 1), addMonths(TM, 2)], [TM]);
  const [mi, setMi] = React.useState(() => {
    // ברירת מחדל: החודש הקרוב שעדיין פתוח לבקשות (כולל "פתוח לבקשות")
    const i = months.findIndex(m => m >= TM && (!published[m] || published[m]?.shift_settings?._status === 'open'));
    return i === -1 ? months.length - 1 : i;
  });
  const [brush, setBrush] = React.useState('un');
  const [saving, setSaving] = React.useState(false);
  const [analyzing, setAnalyzing] = React.useState(false);
  const [aiError, setAiError] = React.useState(null);
  const ym = months[mi];
  const pubRow = published[ym] || null;
  const openStatus = pubRow?.shift_settings?._status === 'open';
  const editable = !pubRow || openStatus;
  const openRange = openStatus ? (pubRow?.shift_settings?._range || null) : null;
  const local = localReqs[ym] || { marks: {}, note: '', dirty: false };
  const server = serverReqs[ym] || null;
  const nDays = daysInMonth(ym);
  const rangeStart = openRange?.start || `${ym}-01`;
  const rangeEnd   = openRange?.end   || `${ym}-${pad(nDays)}`;
  // listDates helper (inline to avoid dependency on external util)
  const rangeDates = React.useMemo(() => {
    const out = [];
    let cur = rangeStart;
    while (cur <= rangeEnd) {
      out.push(cur);
      const d = new Date(cur + 'T12:00:00');
      d.setDate(d.getDate() + 1);
      cur = d.toISOString().slice(0, 10);
    }
    return out;
  }, [rangeStart, rangeEnd]);
  const gridOffset = weekdayOf(rangeStart);
  // gridOffset = weekday of first cell in calendar = weekday of rangeStart
  const [selDay, setSelDay] = React.useState(rangeStart);
  React.useEffect(() => { setSelDay(rangeStart); }, [ym]);
  const selDs = selDay;
  const sel = Number(selDs.slice(8));

  // הגדרות משמרות לפירוט היום: של החודש אם פורסם → העדכניות מהמשבץ → של הפרסום האחרון → ברירת מחדל
  const lastPubSettings = React.useMemo(() => {
    const keys = Object.keys(published).sort();
    for (let i = keys.length - 1; i >= 0; i--) {
      if (published[keys[i]]?.shift_settings) return published[keys[i]].shift_settings;
    }
    return null;
  }, [published]);
  const settings = published[ym]?.shift_settings || globalSettings || lastPubSettings;
  const dayShiftsAll = shiftTypesFor(selDs, settings);
  const dayShifts = dayShiftsAll.filter(s => !s.continuation);       // ניתנות לסימון ביום זה
  const contShifts = dayShiftsAll.filter(s => s.continuation);       // המשך משמרת רב-יומית — מידע בלבד

  const setLocal = (patch) => setLocalReqs(prev => ({ ...prev, [ym]: { ...(prev[ym] || { marks: {}, note: '', dirty: false }), ...patch } }));

  // הקשה על יום בלוח: בוחרת אותו, ובמצב עריכה גם צובעת את כל היום.
  // יום עם סימון חלקי (לפי משמרות) — הקשה רק בוחרת, כדי לא לדרוס את הדיוק; מחיקה עובדת תמיד.
  const tapDay = (dStr) => {
    setSelDay(dStr);
    if (!editable) return;
    const cur = local.marks[dStr];
    if (cur && typeof cur === 'object' && brush !== 'erase') return;
    const marks = { ...local.marks };
    if (brush === 'erase') delete marks[dStr]; else marks[dStr] = brush;
    setLocal({ marks, dirty: true });
  };

  // קביעת סימון למשמרת בודדת מכרטיס הפירוט. יום שצבוע במלואו נפרס קודם לכל המשמרות.
  const setShiftMark = (sid, mark) => {
    if (!editable) return;
    const ids = dayShifts.map(s => s.id);
    const marks = { ...local.marks };
    const cur = marks[selDs];
    let obj = {};
    if (typeof cur === 'string') ids.forEach(id => { obj[id] = cur; });
    else if (cur) obj = { ...cur };
    if (mark) obj[sid] = mark; else delete obj[sid];
    const vals = ids.map(id => obj[id]);
    if (!Object.keys(obj).length) delete marks[selDs];
    else if (ids.length && vals.every(v => v && v === vals[0]) && Object.keys(obj).length === ids.length) marks[selDs] = vals[0];
    else marks[selDs] = obj;
    setLocal({ marks, dirty: true });
  };

  const submit = async () => {
    if (saving) return;
    setSaving(true);
    // "YYYY-MM-DD" = יום שלם, "YYYY-MM-DD@shiftId" = משמרת בודדת
    const toDates = (mark) => {
      const out = [];
      Object.entries(local.marks).forEach(([ds, v]) => {
        if (typeof v === 'string') { if (v === mark) out.push(ds); }
        else Object.entries(v || {}).forEach(([sid, m]) => { if (m === mark) out.push(`${ds}@${sid}`); });
      });
      return out.sort();
    };
    const row = {
      emp_id: me.id, month: ym,
      unavailable: toDates('un'), high: toDates('high'), can: toDates('can'),
      note: local.note || '', updated_at: new Date().toISOString(), updated_by: email,
    };
    const { data, error } = await sb.from('employee_requests').upsert(row).select().single();
    setSaving(false);
    if (error) { console.error(error); showToast('שגיאה בשליחה — נסו שוב'); return; }
    setServerReqs(prev => ({ ...prev, [ym]: data }));
    setLocal({ dirty: false });
    showToast('הבקשות נשלחו ✓');
  };

  const analyzeText = async () => {
    const text = (local.note || '').trim();
    if (!text || !anthropicKey || analyzing) return;
    const keyTrimmed = anthropicKey.trim();
    if (!keyTrimmed.startsWith('sk-ant-')) {
      setAiError(`מפתח לא תקין (${keyTrimmed.slice(0, 12)}…) — המנהל צריך ללחוץ ☁ שמור לענן בהגדרות`);
      return;
    }
    setAnalyzing(true); setAiError(null);
    try {
      const scheduleLabel = openRange
        ? `הסידור (${rangeStart.slice(8)}.${rangeStart.slice(5,7)}–${rangeEnd.slice(8)}.${rangeEnd.slice(5,7)})`
        : `חודש ${monthLabel(ym)} (${ym})`;
      const datesList = rangeDates.map(ds => `${ds} — יום ${HEB_DAYS[weekdayOf(ds)]}`).join('\n');
      const shiftLine = (label, list) => label + ': ' + (list || []).map(s => `${s.id} = ${s.name} ${s.start}–${s.end}`).join(' · ');
      const shiftsDesc = [
        shiftLine('ימי חול (א׳–ה׳)', settings?.weekday),
        shiftLine('שישי', settings?.friday),
        shiftLine('שבת', settings?.saturday),
      ].join('\n');
      const prompt = `אתה מנתח בקשת עובד לסידור עבודה עבור ${scheduleLabel}.
הסידור כולל ימים מחוץ לחודש הקלנדרי — כשהעובד אומר "כל ימי ראשון" או "כל החודש" הכוונה לכל הימים ברשימה למטה.

## כל ימי הסידור וימי השבוע שלהם
${datesList}

## המשמרות הקיימות
${shiftsDesc}

## הבקשה החופשית
"${text}"

## משימה
תרגם לתאריכים. החזר JSON בלבד:
{
  "unavailable": ["YYYY-MM-DD","YYYY-MM-DD@shiftId",...],
  "high": [...],
  "can": [...],
  "note": "סיכום קצר בעברית"
}
כללים:
- unavailable = לא יכול/לא רוצה
- high = מבקש לעבוד
- can = גמיש
- יום שלם: "YYYY-MM-DD"; משמרת ספציפית: "YYYY-MM-DD@shiftId"
- השתמש רק במזהי משמרות מהרשימה למעלה
- כל התאריכים חייבים להיות מהרשימה למעלה (בין ${rangeStart} ל-${rangeEnd}) — כולל ימים מחוץ לחודש הקלנדרי`;
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': keyTrimmed,
          'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1024,
          messages: [{ role: 'user', content: prompt }] }),
      });
      if (!resp.ok) { const err = await resp.json().catch(() => ({})); throw new Error(err.error?.message || `HTTP ${resp.status}`); }
      const apiData = await resp.json();
      const raw = apiData.content?.find(b => b.type === 'text')?.text || '';
      const jsonMatch = raw.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error('לא התקבל JSON תקין');
      const result = JSON.parse(jsonMatch[0]);
      const inRange = (arr) => (Array.isArray(arr) ? arr.filter(v => {
        if (typeof v !== 'string') return false;
        const ds = v.includes('@') ? v.split('@')[0] : v;
        return ds >= rangeStart && ds <= rangeEnd;
      }) : []);
      // המרה לפורמט marks: {"YYYY-MM-DD": mark} או {"YYYY-MM-DD": {shiftId: mark}}
      const newMarks = { ...local.marks };
      [['unavailable', 'un'], ['high', 'high'], ['can', 'can']].forEach(([key, mark]) => {
        inRange(result[key] || []).forEach(entry => {
          const at = entry.indexOf('@');
          const ds = at === -1 ? entry : entry.slice(0, at);
          const sid = at === -1 ? null : entry.slice(at + 1);
          if (!ds) return;
          if (sid) {
            if (typeof newMarks[ds] !== 'object' || !newMarks[ds]) newMarks[ds] = {};
            newMarks[ds] = { ...(typeof newMarks[ds] === 'object' ? newMarks[ds] : {}), [sid]: mark };
          } else {
            newMarks[ds] = mark;
          }
        });
      });
      setLocal({ marks: newMarks, note: result.note || local.note, dirty: true });
      showToast('הסימונים עודכנו ✓ — בדקו וערכו לפי הצורך');
    } catch (err) {
      setAiError(`שגיאת ניתוח: ${err.message}`);
    } finally {
      setAnalyzing(false);
    }
  };

  const hasMarks = Object.keys(local.marks).length > 0;
  const needSend = !server || local.dirty;
  const stats = React.useMemo(() => {
    const s = { un: 0, high: 0, can: 0, days: 0, shifts: 0 };
    Object.values(local.marks).forEach(v => {
      if (typeof v === 'string') { s.days++; s[v]++; }
      else Object.values(v || {}).forEach(m => { s.shifts++; s[m]++; });
    });
    return s;
  }, [local.marks]);
  const sentAt = fmtSentAt(server?.updated_at);

  const BRUSHES = [
    { id: 'un', label: 'לא זמינ.ה' }, { id: 'high', label: 'מעדיפ.ה' },
    { id: 'can', label: 'יכול.ה' }, { id: 'erase', label: 'מחיקה' },
  ];

  return (
    <div style={{ padding: '16px 16px 24px', display: 'flex', flexDirection: 'column', gap: 12, animation: 'fadeIn 0.25s' }}>
      <div style={{ fontSize: 24, fontWeight: 900 }}>הגשת בקשות</div>
      <MonthSwitcher label={monthLabel(ym)} canPrev={mi > 0} canNext={mi < months.length - 1}
        onPrev={() => setMi(mi - 1)} onNext={() => setMi(mi + 1)} />

      {editable && openRange && (
        <div style={{ background: 'color-mix(in oklab, oklch(0.65 0.15 200) 8%, #FFF)', borderRadius: 10, padding: '9px 14px', fontSize: 12.5, fontWeight: 600, color: 'oklch(0.38 0.14 200)', border: '1px solid color-mix(in oklab, oklch(0.65 0.15 200) 25%, transparent)' }}>
          📅 טווח הסידור: {rangeStart.slice(8)}.{rangeStart.slice(5,7)} – {rangeEnd.slice(8)}.{rangeEnd.slice(5,7)}
        </div>
      )}
      {editable ? (<>
        <div style={{ fontSize: 12, color: '#8A867F' }}>1. בוחרים סימון · 2. מקישים על הימים בלוח</div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 7 }}>
          {BRUSHES.map(c => {
            const s = c.id === 'erase' ? { bg: '#FFF', bd: '1px solid #D8D4CE', fg: '#6B6760' } : MARK_STATUS[c.id];
            const active = brush === c.id;
            return (
              <div key={c.id} onClick={() => setBrush(c.id)} style={{ padding: '9px 0', borderRadius: 10, background: s.bg, color: s.fg,
                border: active ? `2px solid ${s.fg}` : s.bd, boxShadow: active ? '0 3px 10px rgba(30,28,24,0.16)' : 'none',
                fontSize: 12, fontWeight: 800, textAlign: 'center', cursor: 'pointer', transition: 'box-shadow 0.15s, border 0.15s' }}>{c.label}</div>
            );
          })}
        </div>
      </>) : (
        <div style={{ background: '#F1EFEB', borderRadius: 10, padding: '11px 14px', fontSize: 13, fontWeight: 700, color: '#56524C' }}>
          הסידור לחודש זה כבר פורסם — הבקשות מוצגות לקריאה בלבד.
        </div>
      )}

      {(editable || hasMarks) && (<>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 5 }}>
          {['א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ש'].map(l => <div key={l} style={{ textAlign: 'center', fontSize: 11, fontWeight: 700, color: '#A09C94' }}>{l}</div>)}
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 5 }}>
          {Array.from({ length: gridOffset }).map((_, i) => <div key={'pad' + i} />)}
          {rangeDates.map(dStr => {
            const v = local.marks[dStr];
            const whole = typeof v === 'string';
            const inCurMonth = dStr.startsWith(ym);
            const s = MARK_STATUS[whole ? v : 'none'];
            const dots = !whole && v ? Object.values(v).map(m => MARK_STATUS[m]?.fg).filter(Boolean) : [];
            const isSel = dStr === selDs;
            const dayNum = Number(dStr.slice(8));
            return (
              <div key={dStr} onClick={() => tapDay(dStr)} style={{ aspectRatio: '1', borderRadius: 10,
                background: inCurMonth ? s.bg : (v ? s.bg : '#F7F5F2'),
                border: isSel ? `2px solid ${INK}` : (inCurMonth ? s.bd : '1px dashed #D8D4CE'),
                color: inCurMonth ? s.fg : (v ? s.fg : '#A09C94'),
                display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 2,
                fontSize: 13, fontWeight: inCurMonth ? 700 : 500,
                cursor: 'pointer', transition: 'background 0.15s, border 0.15s', opacity: inCurMonth ? 1 : 0.75 }}>
                <span>{dayNum}</span>
                {dots.length > 0 && (
                  <span style={{ display: 'flex', gap: 2 }}>
                    {dots.slice(0, 4).map((c, j) => <span key={j} style={{ width: 5, height: 5, borderRadius: '50%', background: c }} />)}
                  </span>
                )}
              </div>
            );
          })}
        </div>
        <div style={{ fontSize: 12, fontWeight: 600, color: '#8A867F', textAlign: 'center' }}>
          {stats.un} לא זמין · {stats.high} מעדיף · {stats.can} יכול
          {stats.shifts > 0 && <> — {stats.days} ימים מלאים · {stats.shifts} משמרות בודדות</>}
        </div>

        {/* כרטיס פירוט היום הנבחר — דיוק ברמת משמרת */}
        <div style={{ background: '#FFF', borderRadius: 14, border: '1px solid #EAE7E1', padding: 14, display: 'flex', flexDirection: 'column', gap: 9 }}>
          <div style={{ fontSize: 14, fontWeight: 900 }}>יום {HEB_DAYS[weekdayOf(selDs)]}, {sel} {inMonthLabel(selDs.slice(0, 7))}</div>
          {editable && <div style={{ fontSize: 12, color: '#8A867F' }}>דיוק לפי משמרת — בחרו סימון לכל משמרת בנפרד:</div>}
          {dayShifts.map(sh => {
            const dayMark = local.marks[sel];
            const cur = typeof dayMark === 'string' ? dayMark : (dayMark || {})[sh.id] || null;
            const CHIPS = [[null, '—'], ['un', 'לא'], ['high', 'מעדיף'], ['can', 'יכול']];
            return (
              <div key={sh.id} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 10px', borderRadius: 10, background: '#FBFAF8', border: '1px solid #ECEAE5' }}>
                <span style={{ width: 8, height: 8, borderRadius: '50%', background: dotOf(sh.id), flexShrink: 0 }} />
                <span style={{ fontSize: 13, fontWeight: 800, whiteSpace: 'nowrap' }}>{sh.name}</span>
                <span style={{ fontSize: 11, color: '#8A867F', whiteSpace: 'nowrap' }}>{sh.start}–{sh.end}</span>
                <span style={{ display: 'flex', gap: 4, marginInlineStart: 'auto' }}>
                  {CHIPS.map(([m, label]) => {
                    const st = m ? MARK_STATUS[m] : { bg: '#FFF', bd: '1px solid #D8D4CE', fg: '#6B6760' };
                    const active = cur === m;
                    return (
                      <span key={label} onClick={() => editable && setShiftMark(sh.id, m)} style={{
                        padding: '5px 9px', borderRadius: 8, fontSize: 11.5, fontWeight: 800,
                        background: active ? st.bg : '#FFF', color: active ? st.fg : '#A09C94',
                        border: active ? (m ? st.bd : `1.5px solid ${INK}`) : '1px solid #E7E4DF',
                        cursor: editable ? 'pointer' : 'default', transition: 'background 0.15s, border 0.15s' }}>
                        {label}
                      </span>
                    );
                  })}
                </span>
              </div>
            );
          })}
          {contShifts.map(sh => (
            <div key={'cont-' + sh.id} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 10px', borderRadius: 10, background: 'oklch(0.96 0.04 80)', border: '1px dashed oklch(0.72 0.1 70)' }}>
              <span style={{ width: 8, height: 8, borderRadius: '50%', background: dotOf(sh.id), flexShrink: 0 }} />
              <span style={{ fontSize: 13, fontWeight: 800 }}>{sh.name}</span>
              <span style={{ fontSize: 11, color: '#8A867F' }}>נמשכת מ־{shortDate(sh.originDate)} — לסימון בחרו את יום ההתחלה</span>
            </div>
          ))}
          {!dayShifts.length && !contShifts.length && <div style={{ fontSize: 12, color: '#A09C94' }}>לא הוגדרו משמרות ליום זה.</div>}
        </div>
      </>)}

      {editable && (<>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          <div style={{ fontSize: 12, fontWeight: 800, color: '#56524C' }}>בקשה חופשית</div>
          <textarea placeholder='כתבו בקשה בשפה חופשית — למשל "לא יכול ימי שני לילה, מעדיף רביעי בוקר"' value={local.note}
            onChange={e => { setLocal({ note: e.target.value, dirty: true }); setAiError(null); }}
            style={{ border: `1.5px solid ${INK}`, borderRadius: 10, padding: '12px 14px', fontSize: 13, background: '#FFF', color: INK, resize: 'none', height: 80 }} />
          {anthropicKey ? (
            <div onClick={!analyzing && local.note?.trim() ? analyzeText : undefined} style={{
              background: analyzing || !local.note?.trim() ? '#F1EFEB' : TEAL,
              color: analyzing || !local.note?.trim() ? '#A09C94' : '#FFF',
              borderRadius: 10, padding: '12px 0', textAlign: 'center', fontSize: 14, fontWeight: 800,
              cursor: analyzing || !local.note?.trim() ? 'default' : 'pointer', transition: 'background 0.2s' }}>
              {analyzing ? '⏳ מנתח…' : '⚡ נתח עם AI — עדכן יומן'}
            </div>
          ) : (
            <div style={{ fontSize: 12, color: '#A09C94', textAlign: 'center', padding: '8px 0' }}>ניתוח AI לא זמין — המנהל לא הגדיר מפתח</div>
          )}
          {aiError && <div style={{ fontSize: 12, fontWeight: 600, color: 'oklch(0.5 0.18 25)', background: 'oklch(0.97 0.03 25)', borderRadius: 8, padding: '8px 12px' }}>{aiError}</div>}
        </div>
        <div onClick={needSend ? submit : undefined} style={{
          background: needSend ? INK : '#FFF', color: needSend ? '#FFF' : TEAL_DARK,
          border: needSend ? `1.5px solid ${INK}` : `1.5px solid ${TEAL}`,
          borderRadius: 10, padding: '14px 0', textAlign: 'center', fontSize: 15, fontWeight: 800, cursor: needSend ? 'pointer' : 'default',
          opacity: saving ? 0.6 : 1, transition: 'background 0.2s, color 0.2s' }}>
          {saving ? 'שולח…' : needSend ? (server ? 'שליחת עדכון' : 'שליחת בקשות') : 'הבקשות נשלחו ✓'}
        </div>
        {sentAt && (
          <div style={{ fontSize: 12, fontWeight: 600, color: '#8A867F', textAlign: 'center' }}>
            עודכן לאחרונה: {sentAt}{local.dirty ? ' · יש שינויים שטרם נשלחו' : ''}
          </div>
        )}
      </>)}

      {!editable && local.note && (
        <div style={{ background: '#FFF', border: '1px solid #EAE7E1', borderRadius: 12, padding: '13px 14px', display: 'flex', flexDirection: 'column', gap: 6 }}>
          <div style={{ fontSize: 12, fontWeight: 800, color: '#8A867F' }}>בקשה חופשית</div>
          <div style={{ fontSize: 14, lineHeight: 1.6 }}>{local.note}</div>
        </div>
      )}
      {!editable && sentAt && <div style={{ fontSize: 12, fontWeight: 600, color: '#8A867F', textAlign: 'center' }}>נשלח לאחרונה: {sentAt}</div>}
      {!editable && !hasMarks && !local.note && (
        <div style={{ padding: '36px 24px', textAlign: 'center', fontSize: 14, color: '#8A867F' }}>לא הגשת בקשות לחודש זה.</div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
