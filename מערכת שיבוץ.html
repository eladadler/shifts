function ShiftsDrawer({ open, onClose, settings, onChange }) {
  const [tab, setTab] = React.useState('regular');
  const [applyingSet, setApplyingSet] = React.useState(null);
  const [expandedSet, setExpandedSet] = React.useState(null);

  // Special tab state (lifted to avoid inner-component-with-hooks)
  const EMPTY_SP = { name: '', date: '', start: '08:00', end: '16:00', required: 1, daysSpan: 1 };
  const [newSp, setNewSp] = React.useState(EMPTY_SP);
  const [editingSpId, setEditingSpId] = React.useState(null);
  const [editingSp, setEditingSp] = React.useState(null);
  const [showTmplPicker, setShowTmplPicker] = React.useState(false);

  const sets = settings.sets || [];
  const templates = settings.templates || [];
  const special = settings.special || [];

  // Group special shifts by date — must be before early return (hooks rule)
  const groupedSpecial = React.useMemo(() => {
    const m = {};
    special.forEach(sp => { (m[sp.date] = m[sp.date] || []).push(sp); });
    return Object.entries(m).sort(([a],[b]) => a.localeCompare(b));
  }, [special]);

  if (!open) return null;

  const updGroup = (group, fn) => onChange({ ...settings, [group]: fn(settings[group]) });
  const updSets = (fn) => onChange({ ...settings, sets: fn(sets) });

  const moveShift = (group, i, dir) => updGroup(group, (arr) => {
    const j = i + dir;
    if (j < 0 || j >= arr.length) return arr;
    const next = [...arr]; [next[i], next[j]] = [next[j], next[i]]; return next;
  });
  const addShift = (group) => updGroup(group, arr => [...arr,
    { id: 'shift-' + Date.now(), name: 'משמרת חדשה', start: '08:00', end: '16:00', required: 1, daysSpan: 1 }]);

  const addSpecialDirect = (sh) => {
    onChange({ ...settings, special: [...special, { ...sh, id: 'sp-' + Date.now() }] });
  };
  const removeSpecial = (id) => onChange({ ...settings, special: special.filter(s => s.id !== id) });
  const startEdit = (sp) => { setEditingSpId(sp.id); setEditingSp({ ...sp }); };
  const cancelEdit = () => { setEditingSpId(null); setEditingSp(null); };
  const saveEdit = () => {
    onChange({ ...settings, special: special.map(sp => sp.id === editingSpId ? editingSp : sp) });
    cancelEdit();
  };

  const loadTemplate = (tmpl) => {
    setNewSp(f => ({ ...f, name: tmpl.name, start: tmpl.start, end: tmpl.end, required: tmpl.required, daysSpan: tmpl.daysSpan }));
    setShowTmplPicker(false);
  };
  const saveAsTemplate = () => {
    if (!newSp.name.trim()) return;
    onChange({ ...settings, templates: [...templates,
      { id: 'tmpl-' + Date.now(), name: newSp.name, start: newSp.start, end: newSp.end, required: newSp.required, daysSpan: newSp.daysSpan }
    ]});
  };
  const deleteTemplate = (id) => onChange({ ...settings, templates: templates.filter(t => t.id !== id) });

  const addSet = () => {
    const id = 'set-' + Date.now();
    updSets(arr => [...arr, { id, name: 'סט חדש', shifts: [] }]);
    setExpandedSet(id);
  };
  const updateSet = (id, fn) => updSets(arr => arr.map(s => s.id === id ? fn(s) : s));
  const applySet = (date, toDelete) => {
    const newSpecial = special.filter(sp => !toDelete.includes(sp.id));
    const newShifts = applyingSet.shifts.map((sh, i) => ({ ...sh, id: 'sp-' + Date.now() + i, date }));
    onChange({ ...settings, special: [...newSpecial, ...newShifts] });
    setApplyingSet(null);
  };

  const renderGroup = (group, label) => (
    <div>
      <div className="settings-sec-title">{label}</div>
      <div className="shift-rows">
        {settings[group].map((shift, i) => (
          <div key={shift.id || i} style={{display:'flex',alignItems:'center',gap:3}}>
            <div style={{display:'flex',flexDirection:'column',gap:1,flexShrink:0}}>
              <button className="shift-req-btn" style={{fontSize:'10px',height:16,width:18}}
                onClick={() => moveShift(group, i, -1)} disabled={i === 0}>↑</button>
              <button className="shift-req-btn" style={{fontSize:'10px',height:16,width:18}}
                onClick={() => moveShift(group, i, 1)} disabled={i === settings[group].length - 1}>↓</button>
            </div>
            <ShiftRowEditorWithSpan shift={shift}
              onChange={(s) => updGroup(group, arr => arr.map((x, j) => j === i ? s : x))}
              onDelete={() => updGroup(group, arr => arr.filter((_, j) => j !== i))} />
          </div>
        ))}
      </div>
      <button className="add-shift-btn" onClick={() => addShift(group)}>+ הוספת משמרת</button>
    </div>
  );

  return (
    <>
    {applyingSet && (
      <ApplySetDialog set={applyingSet} special={special}
        onConfirm={applySet} onCancel={() => setApplyingSet(null)} />
    )}
    <div className="right-drawer-backdrop" onClick={onClose}>
      <aside className="right-drawer" onClick={(e) => e.stopPropagation()}>
        <div className="right-drawer-head">
          <h2 className="right-drawer-title">🗓 משמרות</h2>
          <button className="icon-btn" onClick={onClose} aria-label="סגירה">×</button>
        </div>
        <div className="right-drawer-tabs">
          <button className={'right-drawer-tab' + (tab === 'regular' ? ' on' : '')} onClick={() => setTab('regular')}>קבועות</button>
          <button className={'right-drawer-tab' + (tab === 'sets' ? ' on' : '')} onClick={() => setTab('sets')}>סטים</button>
          <button className={'right-drawer-tab' + (tab === 'special' ? ' on' : '')} onClick={() => setTab('special')}>מיוחדות</button>
        </div>
        <div className="right-drawer-body">
          <div className="settings-warning" style={{marginBottom:14}}>שינויים יחולו על טיוטות חדשות בלבד</div>

          {tab === 'regular' && (
            <div style={{display:'flex',flexDirection:'column',gap:18}}>
              {renderGroup('weekday', 'ימי חול (א׳–ה׳)')}
              {renderGroup('friday',  'יום שישי (ו׳)')}
              {renderGroup('saturday','יום שבת (ש׳)')}
              <button className="btn" style={{width:'100%',fontSize:'12px'}}
                onClick={() => onChange(window.DEFAULT_SHIFT_SETTINGS)}>איפוס לברירות מחדל</button>
            </div>
          )}

          {tab === 'sets' && (
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <div style={{fontSize:'12px',color:'var(--ink-3)',lineHeight:1.5}}>
                סטים הם קבוצות משמרות ללא תאריך — שימושי לחגים שמשתנים מדי שנה. אפשר להחיל סט על כל תאריך שתבחר.
              </div>
              {!sets.length && <div style={{color:'var(--ink-3)',fontSize:'13px',textAlign:'center',padding:'12px 0'}}>אין סטים שמורים</div>}
              {sets.map(set => (
                <div key={set.id} style={{border:'1px solid var(--line)',borderRadius:10,overflow:'hidden'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:'var(--surface-2)',cursor:'pointer'}}
                    onClick={() => setExpandedSet(expandedSet === set.id ? null : set.id)}>
                    <input value={set.name} style={{flex:1,background:'none',border:'none',font:'inherit',fontWeight:600,fontSize:'13px',color:'var(--ink)',outline:'none'}}
                      onChange={e => updateSet(set.id, s => ({...s, name: e.target.value}))}
                      onClick={e => e.stopPropagation()} />
                    <span style={{fontSize:'11px',color:'var(--ink-3)'}}>{set.shifts.length} משמרות</span>
                    <button className="btn" style={{padding:'3px 10px',fontSize:'11.5px'}}
                      onClick={e => { e.stopPropagation(); setApplyingSet(set); }}>החל על תאריך</button>
                    <button className="shift-del-btn"
                      onClick={e => { e.stopPropagation(); if(window.confirm(`למחוק את הסט "${set.name}"?`)) updSets(arr => arr.filter(s => s.id !== set.id)); }}>×</button>
                    <span style={{fontSize:'12px',color:'var(--ink-3)'}}>{expandedSet === set.id ? '▴' : '▾'}</span>
                  </div>
                  {expandedSet === set.id && (
                    <div style={{padding:'10px 12px',display:'flex',flexDirection:'column',gap:8}}>
                      {set.shifts.map((sh, i) => (
                        <ShiftFormRow key={sh.id || i} sh={sh}
                          onChange={v => updateSet(set.id, s => ({...s, shifts: s.shifts.map((x,j) => j===i?v:x)}))}
                          onDelete={() => updateSet(set.id, s => ({...s, shifts: s.shifts.filter((_,j) => j!==i)}))} />
                      ))}
                      <button className="add-shift-btn" onClick={() => updateSet(set.id, s => ({
                        ...s, shifts: [...s.shifts, {id:'ssh-'+Date.now(), name:'משמרת', start:'08:00', end:'16:00', required:1, daysSpan:1}]
                      }))}>+ הוספת משמרת לסט</button>
                    </div>
                  )}
                </div>
              ))}
              <button className="btn btn-primary" style={{fontSize:'12px'}} onClick={addSet}>+ סט חדש</button>
            </div>
          )}

          {tab === 'special' && (
            <div style={{display:'flex',flexDirection:'column',gap:14}}>

              {/* --- טופס הוספה --- */}
              <div className="settings-sec-title">הוספת משמרת מיוחדת</div>

              {templates.length > 0 && (
                <div style={{position:'relative'}}>
                  <button className="btn" style={{width:'100%',fontSize:'12px',textAlign:'right'}}
                    onClick={() => setShowTmplPicker(v => !v)}>
                    ▾ טען מתבנית
                  </button>
                  {showTmplPicker && (
                    <div style={{position:'absolute',top:'100%',insetInlineStart:0,insetInlineEnd:0,zIndex:10,background:'var(--surface)',border:'1px solid var(--line)',borderRadius:8,boxShadow:'var(--shadow)',padding:6,display:'flex',flexDirection:'column',gap:3}}>
                      {templates.map(t => (
                        <button key={t.id} style={{padding:'5px 10px',background:'none',border:'none',textAlign:'right',cursor:'pointer',borderRadius:5,fontSize:'12.5px',color:'var(--ink)'}}
                          onMouseEnter={e => e.target.style.background='var(--surface-2)'}
                          onMouseLeave={e => e.target.style.background='none'}
                          onClick={() => loadTemplate(t)}>
                          {t.name} <span style={{color:'var(--ink-3)',fontSize:'11px'}}>{t.start}–{t.end}</span>
                        </button>
                      ))}
                    </div>
                  )}
                </div>
              )}

              <ShiftFormRow sh={newSp} showDate onChange={setNewSp}
                onDateChange={v => setNewSp(f => ({...f, date: v}))}
                onDelete={() => setNewSp(EMPTY_SP)} />

              <div style={{display:'flex',gap:6}}>
                <button className="btn btn-primary" style={{flex:1,fontSize:'12px'}} disabled={!newSp.date || !newSp.name.trim()}
                  onClick={() => { addSpecialDirect(newSp); setNewSp(EMPTY_SP); }}>
                  + הוספה
                </button>
                <button className="btn" style={{fontSize:'12px'}} title="שמור כתבנית לשימוש עתידי"
                  disabled={!newSp.name.trim()} onClick={saveAsTemplate}>
                  שמור כתבנית
                </button>
              </div>

              {/* --- רשימת משמרות קיימות --- */}
              <div className="settings-sec-title">משמרות מיוחדות שהוגדרו</div>
              {!groupedSpecial.length ? (
                <div style={{color:'var(--ink-3)',fontSize:'13px',textAlign:'center',padding:'12px 0'}}>לא הוגדרו משמרות מיוחדות</div>
              ) : groupedSpecial.map(([date, sps]) => (
                <div key={date}>
                  <div style={{fontSize:'11.5px',fontWeight:600,color:'var(--ink-2)',marginBottom:4}}>
                    {SD.shortDate(date)} — {SD.dayLabel(date)}
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:4,paddingInlineStart:8}}>
                    {sps.map(sp => (
                      <div key={sp.id}>
                        {editingSpId === sp.id ? (
                          <div style={{display:'flex',flexDirection:'column',gap:6}}>
                            <ShiftFormRow sh={editingSp} showDate onChange={setEditingSp}
                              onDateChange={v => setEditingSp(f => ({...f, date: v}))}
                              onDelete={cancelEdit} />
                            <div style={{display:'flex',gap:6}}>
                              <button className="btn btn-primary" style={{flex:1,fontSize:'12px'}} onClick={saveEdit}>שמור</button>
                              <button className="btn" style={{fontSize:'12px'}} onClick={cancelEdit}>ביטול</button>
                            </div>
                          </div>
                        ) : (
                          <div className="shift-row">
                            <span style={{flex:1,fontWeight:600,fontSize:'12.5px'}}>{sp.name}</span>
                            <span style={{fontSize:'11px',color:'var(--ink-3)'}}>מ־{sp.start} עד {sp.end}</span>
                            {(sp.daysSpan||1) > 1 && <span style={{fontSize:'10px',color:'var(--accent)',marginInlineStart:4}}>{sp.daysSpan}י׳</span>}
                            <button className="btn" style={{padding:'2px 8px',fontSize:'11px',marginInlineStart:4}} onClick={() => startEdit(sp)}>ערוך</button>
                            <button className="shift-del-btn" onClick={() => removeSpecial(sp.id)}>×</button>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              ))}

              {/* --- ניהול תבניות --- */}
              {templates.length > 0 && (
                <>
                  <div className="settings-sec-title">תבניות שמורות</div>
                  <div style={{display:'flex',flexDirection:'column',gap:4}}>
                    {templates.map(t => (
                      <div key={t.id} className="shift-row">
                        <span style={{flex:1,fontWeight:600,fontSize:'12.5px'}}>{t.name}</span>
                        <span style={{fontSize:'11px',color:'var(--ink-3)'}}>מ־{t.start} עד {t.end}</span>
                        {(t.daysSpan||1) > 1 && <span style={{fontSize:'10px',color:'var(--accent)',marginInlineStart:4}}>{t.daysSpan}י׳</span>}
                        <button className="shift-del-btn" onClick={() => deleteTemplate(t.id)}>×</button>
                      </div>
                    ))}
                  </div>
                </>
              )}
            </div>
          )}
        </div>
      </aside>
    </div>
    </>
  );
}

// ---- SettingsDrawer ----
function SettingsDrawer({ open, onClose, tweaks, onTweakChange, apiKey, onApiKeyChange }) {
  if (!open) return null;
  const ACCENTS = ['#3D63C9', '#1F8A5B', '#7A5AE0', '#B5512E', '#C9393D', '#0891B2'];
  const [showKey, setShowKey] = React.useState(false);

  return (
    <div className="right-drawer-backdrop" onClick={onClose}>
      <aside className="right-drawer" style={{maxWidth:340}} onClick={(e) => e.stopPropagation()}>
        <div className="right-drawer-head">
          <h2 className="right-drawer-title">⚙ הגדרות תצוגה</h2>
          <button className="icon-btn" onClick={onClose} aria-label="סגירה">×</button>
        </div>
        <div className="right-drawer-body">
          <div style={{display:'flex',flexDirection:'column',gap:20}}>
            <div>
              <div className="settings-sec-title">מצב תצוגה</div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:10,padding:'0 2px'}}>
                <span style={{fontSize:'13px'}}>מצב כהה</span>
                <label className="toggle-switch">
                  <input type="checkbox" checked={!!tweaks.dark} onChange={(e) => onTweakChange('dark', e.target.checked)} />
                  <span className="toggle-slider"></span>
                </label>
              </div>
            </div>
            <div>
              <div className="settings-sec-title">צפיפות לוח</div>
              <div style={{display:'flex',gap:8,marginTop:10}}>
                {['רגילה', 'קומפקטית'].map((d) => (
                  <button key={d} className={'btn' + (tweaks.density === d ? ' btn-primary' : '')}
                    style={{flex:1,fontSize:'12px'}}
                    onClick={() => onTweakChange('density', d)}>{d}</button>
                ))}
              </div>
            </div>
            <div>
              <div className="settings-sec-title">צבע ראשי</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:10}}>
                {ACCENTS.map((c) => (
                  <button key={c} onClick={() => onTweakChange('accent', c)}
                    style={{
                      width:36,height:36,borderRadius:8,background:c,border:'none',cursor:'pointer',
                      boxShadow: tweaks.accent === c ? `0 0 0 2.5px var(--surface), 0 0 0 4.5px ${c}` : 'none',
                      transition:'box-shadow 0.15s'
                    }} title={c} />
                ))}
              </div>
            </div>
            <div>
              <div className="settings-sec-title">✦ שיבוץ AI — מפתח Anthropic</div>
              <div style={{marginTop:10,fontSize:'12px',color:'var(--ink-3)',marginBottom:8,lineHeight:1.5}}>
                נדרש לשיבוץ האוטומטי עם Claude.{' '}
                <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener" style={{color:'var(--accent)'}}>קבל מפתח</a>
              </div>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                <input
                  type={showKey ? 'text' : 'password'}
                  value={apiKey}
                  onChange={e => onApiKeyChange(e.target.value)}
                  placeholder="sk-ant-..."
                  style={{
                    flex:1, border:'1px solid var(--line)', borderRadius:7,
                    padding:'7px 10px', fontSize:'13px', background:'var(--surface)',
                    color:'var(--ink)', font:'inherit', outline:'none',
                    fontFamily:'monospace',
                  }}
                />
                <button className="btn" style={{padding:'6px 10px',fontSize:'12px',flexShrink:0}}
                  onClick={() => setShowKey(v => !v)}>
                  {showKey ? 'הסתר' : 'הצג'}
                </button>
              </div>
              {apiKey && <div style={{marginTop:6,fontSize:'11px',color:'var(--ok)'}}>✓ מפתח שמור בדפדפן בלבד</div>}
            </div>
          </div>
        </div>
      </aside>
    </div>
  );
}

// ---- EmployeesScreen ----
function EmployeesScreen({ employees: initEmps, onEmployeesChange }) {
  const [emps, setEmps] = React.useState(initEmps);
  const [showForm, setShowForm] = React.useState(false);
  const [editEmp, setEditEmp] = React.useState(null);
  const COLORS = ['oklch(0.62 0.14 250)','oklch(0.62 0.14 330)','oklch(0.62 0.14 160)','oklch(0.62 0.14 50)','oklch(0.62 0.14 210)','oklch(0.62 0.14 10)','oklch(0.62 0.14 290)','oklch(0.62 0.14 130)'];

  const updateEmps = (fn) => {
    setEmps(prev => {
      const next = fn(prev);
      if (onEmployeesChange) onEmployeesChange(next);
      return next;
    });
  };

  const openAdd = () => {
    setEditEmp({ id: 'emp-' + Date.now(), name: '', role: '', color: COLORS[0], max: 16, anchor: false, nights: false });
    setShowForm(true);
  };
  const openEdit = (emp) => { setEditEmp({ ...emp }); setShowForm(true); };
  const saveEmp = () => {
    if (!editEmp.name.trim()) return;
    updateEmps(prev => prev.find(e => e.id === editEmp.id)
      ? prev.map(e => e.id === editEmp.id ? editEmp : e)
      : [...prev, editEmp]);
    setShowForm(false);
  };
  const deleteEmp = (id) => { if (window.confirm('למחוק עובד זה?')) updateEmps(prev => prev.filter(e => e.id !== id)); };

  return (
    <div className="mgmt-screen">
      <div className="mgmt-toolbar">
        <h2 className="mgmt-title">👥 עובדים</h2>
        <button className="btn btn-primary" style={{marginInlineStart:'auto'}} onClick={openAdd}>+ הוספת עובד</button>
      </div>

      <div className="emp-table">
        <div className="emp-table-row emp-table-head">
          <span>שם</span><span>תפקיד</span>
          <span style={{textAlign:'center'}}>מכסה</span>
          <span style={{textAlign:'center'}}>לילות</span>
          <span></span>
        </div>
        {emps.map((emp) => (
          <div key={emp.id} className="emp-table-row">
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <window.Avatar emp={emp} size={30} />
              <div>
                <div style={{fontWeight:600,fontSize:'13px'}}>{emp.name}</div>
                {emp.anchor && <span style={{fontSize:'10px',color:'var(--ink-3)'}}>⚓ עוגן</span>}
              </div>
            </div>
            <span style={{fontSize:'13px',color:'var(--ink-2)'}}>{emp.role}</span>
            <span style={{textAlign:'center',fontSize:'13px',fontWeight:600}}>{emp.max}</span>
            <span style={{textAlign:'center',fontSize:'14px'}}>{emp.nights ? '✓' : '—'}</span>
            <div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>
              <button className="btn" style={{padding:'4px 10px',fontSize:'12px'}} onClick={() => openEdit(emp)}>עריכה</button>
              <button className="btn" style={{padding:'4px 10px',fontSize:'12px',color:'var(--danger)',borderColor:'color-mix(in oklab, var(--danger) 40%, transparent)'}} onClick={() => deleteEmp(emp.id)}>מחיקה</button>
            </div>
          </div>
        ))}
      </div>

      {showForm && editEmp && (
        <div className="modal-backdrop" onClick={() => setShowForm(false)}>
          <div className="modal" onClick={(e) => e.stopPropagation()}>
            <div className="modal-head">
              <h2 className="modal-title">{emps.find(e => e.id === editEmp.id) ? 'עריכת עובד' : 'הוספת עובד'}</h2>
              <button className="icon-btn" onClick={() => setShowForm(false)}>×</button>
            </div>
            <div className="modal-body">
              <div className="field">
                <label className="field-label">שם פרטי <span style={{color:'var(--danger)'}}>*</span></label>
                <input style={{border:'1px solid var(--line)',borderRadius:7,padding:'7px 10px',fontSize:'14px',background:'var(--surface)',color:'var(--ink)',font:'inherit',outline:'none',width:'100%'}}
                  value={editEmp.name} onChange={(e) => setEditEmp(p => ({...p, name: e.target.value}))} autoFocus
                  placeholder="שדה חובה יחיד — אפשר להוסיף שם משפחה אם רוצים" />
              </div>
              <div className="field">
                <label className="field-label">תפקיד <span style={{color:'var(--ink-3)',fontWeight:400}}>(רשות)</span></label>
                <input style={{border:'1px solid var(--line)',borderRadius:7,padding:'7px 10px',fontSize:'14px',background:'var(--surface)',color:'var(--ink)',font:'inherit',outline:'none',width:'100%'}}
                  value={editEmp.role} onChange={(e) => setEditEmp(p => ({...p, role: e.target.value}))} />
              </div>
              <div className="field">
                <label className="field-label">מכסה חודשית <span style={{color:'var(--ink-3)',fontWeight:400}}>(רשות)</span></label>
                <div className="stepper">
                  <button className="stepper-btn" onClick={() => setEditEmp(p => ({...p, max: Math.max(1, p.max - 1)}))}>−</button>
                  <span className="stepper-val">{editEmp.max}</span>
                  <button className="stepper-btn" onClick={() => setEditEmp(p => ({...p, max: p.max + 1}))}>+</button>
                  <span className="field-hint">משמרות לחודש</span>
                </div>
              </div>
              <div style={{display:'flex',gap:20}}>
                <label style={{display:'flex',alignItems:'center',gap:8,fontSize:'13px',cursor:'pointer'}}>
                  <input type="checkbox" checked={editEmp.anchor} onChange={(e) => setEditEmp(p => ({...p, anchor: e.target.checked}))} />
                  עוגן (ותיק)
                </label>
                <label style={{display:'flex',alignItems:'center',gap:8,fontSize:'13px',cursor:'pointer'}}>
                  <input type="checkbox" checked={editEmp.nights} onChange={(e) => setEditEmp(p => ({...p, nights: e.target.checked}))} />
                  משמרות לילה
                </label>
              </div>
              <div className="field">
                <label className="field-label">צבע</label>
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  {COLORS.map(c => (
                    <button key={c} onClick={() => setEditEmp(p => ({...p, color: c}))}
                      style={{width:32,height:32,borderRadius:7,background:c,border:`2.5px solid ${editEmp.color === c ? 'var(--ink)' : 'transparent'}`,cursor:'pointer',transition:'border-color 0.1s'}} />
                  ))}
                </div>
              </div>
            </div>
            <div className="modal-foot">
              <span></span>
              <div className="modal-actions">
                <button className="btn" onClick={() => setShowForm(false)}>ביטול</button>
                <button className="btn btn-primary" onClick={saveEmp}>שמירה</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ---- RequestsScreen ----
function RequestsScreen({ employees, requests }) {
  const empsWithReqs = employees.filter((e) => requests[e.id]);
  const tagCls = { unavailable: 'av-no', high: 'av-high', can: 'av-can' };
  const tagLabel = { unavailable: 'לא יכול', high: 'עדיפות גבוהה', can: 'יכול לעבוד' };

  return (
    <div className="mgmt-screen">
      <div className="mgmt-toolbar">
        <h2 className="mgmt-title">📋 בקשות עובדים</h2>
        <span style={{fontSize:'13px',color:'var(--ink-3)',marginInlineStart:'auto'}}>{empsWithReqs.length} עובדים הגישו בקשות</span>
      </div>

      {!empsWithReqs.length ? (
        <div style={{textAlign:'center',padding:'40px',color:'var(--ink-3)'}}>אין בקשות לחודש זה</div>
      ) : (
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {empsWithReqs.map((emp) => {
            const req = requests[emp.id];
            const tags = [
              ...(req.unavailable || []).map((d) => ({ d, type: 'unavailable' })),
              ...(req.high || []).map((d) => ({ d, type: 'high' })),
              ...(req.can || []).map((d) => ({ d, type: 'can' })),
            ].sort((a, b) => a.d.localeCompare(b.d));
            return (
              <div key={emp.id} className="req-card" style={{background:'var(--surface)'}}>
                <div className="req-card-head">
                  <window.Avatar emp={emp} size={30} />
                  <div>
                    <div className="req-card-name">{emp.name}</div>
                    <div style={{fontSize:'11.5px',color:'var(--ink-3)'}}>{emp.role}</div>
                  </div>
                  <span style={{marginInlineStart:'auto',fontSize:'12px',color:'var(--ink-3)'}}>{tags.length} בקשות</span>
                </div>
                <div className="req-tags">
                  {tags.map(({ d, type }) => (
                    <span key={d + type} className={'req-tag av-tag ' + tagCls[type]} title={tagLabel[type]}>
                      {SD.shortDate(d)} · {tagLabel[type]}
                    </span>
                  ))}
                </div>
                {req.note && <div className="req-note">{req.note}</div>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ---- HamburgerMenu ----
function HamburgerMenu({ screen, onNavigate }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);

  React.useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);

  const nav = (s) => { onNavigate(s); setOpen(false); };

  return (
    <div className="ham-wrap" ref={ref}>
      <button className="ham-btn" onClick={() => setOpen(o => !o)} title="תפריט" aria-label="תפריט">≡</button>
      {open && (
        <div className="ham-dropdown">
          <button className={'ham-item' + (screen === 'calendar' ? ' active' : '')} onClick={() => nav('calendar')}>
            📅 סידור
          </button>
          <button className={'ham-item' + (screen === 'employees' ? ' active' : '')} onClick={() => nav('employees')}>
            👥 עובדים
          </button>
          <button className={'ham-item' + (screen === 'requests' ? ' active' : '')} onClick={() => nav('requests')}>
            📋 בקשות
          </button>
        </div>
      )}
    </div>
  );
}

Object.assign(window, { ShiftsDrawer, SettingsDrawer, EmployeesScreen, RequestsScreen, HamburgerMenu });

<script type="text/babel">
const MD = window.ShiftData;
const ME = window.ShiftEngine;

function GenerateDraftModal({ open, onClose, onGenerate, initialRange, initialExcluded, month }) {
  const activeMonth = month || MD.MONTH;
  const base = ME.defaultRange(activeMonth);
  const [daysBefore, setDaysBefore] = React.useState(0);
  const [daysAfter, setDaysAfter] = React.useState(0);
  const [excluded, setExcluded] = React.useState(initialExcluded || []);

  React.useEffect(() => {
    if (open) {
      const r = initialRange || base;
      setDaysBefore(Math.max(0, Math.round((MD.parseDate(base.start) - MD.parseDate(r.start)) / 864e5)));
      setDaysAfter(Math.max(0, Math.round((MD.parseDate(r.end) - MD.parseDate(base.end)) / 864e5)));
      setExcluded(initialExcluded || []);
    }
  }, [open]);

  if (!open) return null;

  const range = { start: MD.addDays(base.start, -daysBefore), end: MD.addDays(base.end, daysAfter) };
  const dates = ME.listDates(range.start, range.end);
  const toggleExcluded = (d) => setExcluded((xs) => xs.includes(d) ? xs.filter((x) => x !== d) : [...xs, d]);
  const activeCount = dates.length - excluded.filter((d) => dates.includes(d)).length;

  const stepper = (label, value, setValue, max, hint) => (
    <div className="field">
      <label className="field-label">{label}</label>
      <div className="stepper">
        <button className="stepper-btn" onClick={() => setValue(Math.max(0, value - 1))} aria-label="הפחתה">−</button>
        <span className="stepper-val">{value}</span>
        <button className="stepper-btn" onClick={() => setValue(Math.min(max, value + 1))} aria-label="הוספה">+</button>
        <span className="field-hint">{hint}</span>
      </div>
    </div>
  );

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-head">
          <h2 className="modal-title">יצירת טיוטה חדשה</h2>
          <button className="icon-btn" onClick={onClose} aria-label="סגירה">×</button>
        </div>

        <div className="modal-body">
          <div className="field">
            <label className="field-label">חודש ראשי</label>
            <div className="month-pill">{MD.monthLabel(activeMonth)}</div>
          </div>

          <div className="field-row">
            {stepper('ימים מהחודש הקודם', daysBefore, setDaysBefore, 7, daysBefore ? `מ־${MD.shortDate(range.start)}` : '')}
            {stepper('ימים מהחודש הבא', daysAfter, setDaysAfter, 7, daysAfter ? `עד ${MD.shortDate(range.end)}` : '')}
          </div>

          <div className="field">
            <label className="field-label">הוצאת ימים מהסידור <span className="field-sub">לחצו על יום כדי להחריג (חגים, ימי סגירה)</span></label>
            <div className="exclude-cal">
              {MD.HEB_DAYS.map((d) => (
                <div key={d} className="exclude-cal-head">{d}</div>
              ))}
              {Array.from({ length: MD.weekdayOf(dates[0]) }).map((_, i) => (
                <div key={'pad-' + i} />
              ))}
              {dates.map((d) => {
                const isMain = d >= base.start && d <= base.end;
                return (
                  <button key={d}
                    className={'exclude-pill' + (excluded.includes(d) ? ' off' : '') + (MD.weekdayOf(d) >= 5 ? ' wknd' : '') + (!isMain ? ' out-of-month' : '')}
                    onClick={() => toggleExcluded(d)}
                    title={`${MD.dayLabel(d)} ${MD.shortDate(d)}`}>
                    <span className="exclude-pill-num">{MD.parseDate(d).getDate()}</span>
                  </button>
                );
              })}
            </div>
          </div>
        </div>

        <div className="modal-foot">
          <span className="modal-summary">{activeCount} ימים בסידור · {excluded.length} מוחרגים</span>
          <div className="modal-actions">
            <button className="btn" onClick={onClose}>ביטול</button>
            <button className="btn btn-primary" onClick={() => onGenerate({ startDate: range.start, endDate: range.end, excluded })}>
              ✦ צור טיוטה
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

const LOG_META = {
  info: { label: 'מידע', cls: 'log-info' },
  dilemma: { label: 'דילמה', cls: 'log-dilemma' },

<!-- ============ App — מעטפת ראשית ============ -->
<script type="text/babel">
const AD = window.ShiftData;
const AE = window.ShiftEngine;

const STORAGE_KEY = 'mishmarot-state-v6';
const ShiftSettingsCtx = window.ShiftSettingsCtx;
const DEFAULT_SHIFT_SETTINGS = window.DEFAULT_SHIFT_SETTINGS;

const STATUS_META = {
  preview:    { label: 'טרם נוצרה טיוטה', cls: 'st-preview' },
  generating: { label: 'ה־AI משבץ…',      cls: 'st-generating' },
  draft:      { label: 'טיוטה',            cls: 'st-draft' },
  final:      { label: 'סידור סופי',       cls: 'st-final' },
};

const TWEAK_DEFAULTS = { accent: '#3D63C9', density: 'רגילה', dark: false };

// עובדי הדמו ההיסטוריים — מנוקים מכל state שמור כדי שלא יחזרו אחרי המחיקה
const DEMO_EMP_IDS = new Set(['yossi','dana','danny','noa','avi','michal','omer','tamar','itay','shira','roni','lior','hila','alon']);

function purgeDemoEmployees(state) {
  if (!state) return state;
  const employees = (state.employees || []).filter(e => !DEMO_EMP_IDS.has(e.id));
  const drafts = (state.drafts || []).map(d => {
    const schedule = {};
    Object.entries(d.schedule || {}).forEach(([date, day]) => {
      const nd = {};
      Object.entries(day || {}).forEach(([sid, ids]) => {
        nd[sid] = (ids || []).filter(id => !DEMO_EMP_IDS.has(id));
      });
      schedule[date] = nd;
    });
    return { ...d, schedule };
  });
  return { ...state, employees, drafts };
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (s && Array.isArray(s.drafts)) return purgeDemoEmployees(s);
  } catch (e) {}
  return null;
}

function applyState(setter, state) {
  if (!state || !Array.isArray(state.drafts)) return false;
  setter(state);
  return true;
}

function mergeSettings(saved) {
  if (!saved) return DEFAULT_SHIFT_SETTINGS;
  const oldWeekend = saved.weekend;
  return {
    weekday:  saved.weekday  || DEFAULT_SHIFT_SETTINGS.weekday,
    friday:   saved.friday   || oldWeekend || DEFAULT_SHIFT_SETTINGS.friday,
    saturday: saved.saturday || oldWeekend || DEFAULT_SHIFT_SETTINGS.saturday,
    special:  saved.special  || [],
    sets:     saved.sets     || [],
    templates: saved.templates || [],
    dayOrder: saved.dayOrder || {},
  };
}

function DraftTab({ draft, isActive, onSelect, onRename }) {
  const [editName, setEditName] = React.useState(null);
  const inputRef = React.useRef(null);

  const startEdit = (e) => {
    e.stopPropagation();
    setEditName(draft.name);
    setTimeout(() => inputRef.current?.select(), 0);
  };

  const finishEdit = () => {
    const trimmed = (editName || '').trim() || draft.name;
    onRename(draft.id, trimmed);
    setEditName(null);
  };

  return (
    <div className={'draft-tab' + (isActive ? ' active' : '')} onClick={() => onSelect(draft.id)}>
      {editName !== null ? (
        <input ref={inputRef} className="draft-tab-input" value={editName}
          onChange={(e) => setEditName(e.target.value)}
          onBlur={finishEdit}
          onKeyDown={(e) => { if (e.key === 'Enter') finishEdit(); if (e.key === 'Escape') setEditName(null); }}
          onClick={(e) => e.stopPropagation()} />
      ) : (
        <span className="draft-tab-name" title="לחצו פעמיים לשינוי שם" onDoubleClick={startEdit}>{draft.name}</span>
      )}
      <span className={'status-chip ' + STATUS_META[draft.status].cls} style={{fontSize:'10px',padding:'1px 7px'}}>
        {STATUS_META[draft.status].label}
      </span>
    </div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const saved = React.useMemo(loadState, []);

  const [currentMonth, setCurrentMonth] = React.useState(saved?.currentMonth || AD.MONTH);
  const [drafts, setDrafts] = React.useState(saved?.drafts || []);
  const [activeDraftId, setActiveDraftId] = React.useState(saved?.activeDraftId || null);
  const [shiftSettings, setShiftSettings] = React.useState(() => mergeSettings(saved?.shiftSettings));
  const [generatingId, setGeneratingId] = React.useState(null);
  const [anthropicKey, setAnthropicKey] = React.useState(() => localStorage.getItem('anthropic-api-key') || '');
  const [employees, setEmployees] = React.useState(() => saved?.employees || [...AD.EMPLOYEES]);
  const [selectedDate, setSelectedDate] = React.useState(null);
  const [draggingEmp, setDraggingEmp] = React.useState(null);
  const [modalOpen, setModalOpen] = React.useState(false);
  const [logOpen, setLogOpen] = React.useState(false);
  const [screen, setScreen] = React.useState('calendar');
  const [shiftsDrawerOpen, setShiftsDrawerOpen] = React.useState(false);
  const [settingsDrawerOpen, setSettingsDrawerOpen] = React.useState(false);
  const [syncStatus, setSyncStatus] = React.useState('loading'); // loading | saving | saved | error | idle

  const saveTimerRef = React.useRef(null);
  const isFirstLoad = React.useRef(true);
  const dbAvailable = React.useRef(typeof window.__db !== 'undefined');

  // סנכרון employees → window.ShiftData.EMPLOYEES
  React.useEffect(() => { window.ShiftData.EMPLOYEES = employees; }, [employees]);

  // טעינה ראשונית מ-Supabase
  React.useEffect(() => {
    if (!dbAvailable.current) { setSyncStatus('idle'); return; }
    setSyncStatus('loading');
    window.__db.load().then(remote => {
      if (remote && Array.isArray(remote.drafts)) {
        remote = purgeDemoEmployees(remote);
        setCurrentMonth(remote.currentMonth || AD.MONTH);
        setDrafts(remote.drafts);
        setActiveDraftId(remote.activeDraftId || null);
        setShiftSettings(mergeSettings(remote.shiftSettings));
        setEmployees(remote.employees || []);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(remote));
      }
      setSyncStatus('saved');
      isFirstLoad.current = false;
    }).catch(() => { setSyncStatus('error'); isFirstLoad.current = false; });
  }, []);

  // התמדה — localStorage + Supabase (מדוד)
  React.useEffect(() => {
    if (generatingId) return;
    if (isFirstLoad.current) return;
    const state = { currentMonth, drafts, activeDraftId, shiftSettings, employees };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    if (!dbAvailable.current) return;
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    setSyncStatus('saving');
    saveTimerRef.current = setTimeout(async () => {
      const ok = await window.__db.save(state);
      setSyncStatus(ok ? 'saved' : 'error');
    }, 1200);
  }, [currentMonth, drafts, activeDraftId, shiftSettings, employees, generatingId]);

  // ערכת נושא
  React.useEffect(() => {
    const root = document.documentElement;
    root.dataset.theme = t.dark ? 'dark' : 'light';
    root.dataset.density = t.density === 'קומפקטית' ? 'compact' : 'regular';
    root.style.setProperty('--accent', t.accent);
  }, [t.dark, t.density, t.accent]);

  // בחירת טיוטה אחרונה בעת מעבר חודש
  React.useEffect(() => {
    const mds = drafts.filter(d => d.month === currentMonth);
    if (!mds.find(d => d.id === activeDraftId)) {
      setActiveDraftId(mds.length ? mds[mds.length - 1].id : null);
    }
  }, [currentMonth]);

  const monthDrafts = drafts.filter(d => d.month === currentMonth);
  const currentDraft = drafts.find(d => d.id === activeDraftId) || null;
  const isGenerating = generatingId === activeDraftId;
  const status = isGenerating ? 'generating' : (currentDraft?.status || 'preview');
  const editable = status === 'draft';

  const updateDraft = (id, fn) => setDrafts(ds => ds.map(d => d.id === id ? { ...d, ...fn(d) } : d));

  const conflicts = React.useMemo(() => currentDraft ? AE.detectConflicts(currentDraft.schedule, shiftSettings) : {}, [currentDraft, shiftSettings]);
  const conflictCount = Object.keys(conflicts).length;
  const dilemmaCount = (currentDraft?.log || []).filter(l => l.type !== 'info').length;

  // ניווט חודשים
  const navigateMonth = (dir) => {
    const [y, m] = currentMonth.split('-').map(Number);
    const nd = new Date(y, m - 1 + dir, 1);
    setCurrentMonth(`${nd.getFullYear()}-${AD.pad(nd.getMonth() + 1)}`);
  };

  // יצירת טיוטה חדשה (ריקה + משמרות קבועות)
  const createDraft = (opts) => {
    setModalOpen(false);
    const id = String(Date.now());
    const num = drafts.filter(d => d.month === currentMonth).length + 1;
    const dates = AE.listDates(opts.startDate, opts.endDate).filter(d => !opts.excluded.includes(d));
    const schedule = AE.applyFixed(dates, AD.FIXED_SHIFTS, shiftSettings);
    setDrafts(ds => [...ds, {
      id, name: `טיוטה ${num}`,
      month: currentMonth,
      status: 'draft',
      range: { start: opts.startDate, end: opts.endDate },
      excluded: opts.excluded,
      schedule, log: [],
      createdAt: Date.now(),
    }]);
    setActiveDraftId(id);
  };

  // שיבוץ אוטומטי — Claude Sonnet 4.6
  const runAI = async () => {
    if (!currentDraft) return;
    if (!anthropicKey.trim()) {
      setSettingsDrawerOpen(true);
      return;
    }
    const id = activeDraftId;
    const snap = JSON.parse(JSON.stringify(currentDraft));
    setGeneratingId(id);
    try {
      const empList = employees.map(e => ({
        id: e.id, name: e.name, role: e.role, maxShifts: e.max,
        canDoNights: !!e.nights, nightOwl: !!e.nightOwl, anchor: !!e.anchor,
        requests: AD.reqOf(e.id) || null,
      }));
      const dates = [];
      let cur = snap.range.start;
      while (cur <= snap.range.end) {
        if (!snap.excluded.includes(cur)) dates.push(cur);
        cur = AD.addDays(cur, 1);
      }
      const shiftReqs = {};
      dates.forEach(d => {
        shiftReqs[d] = AD.shiftTypesFor(d, shiftSettings)
          .filter(s => !s.continuation)
          .map(s => ({ id: s.id, name: s.name, required: s.required, isNight: s.id === 'night' }));
      });

      const prompt = `אתה מערכת שיבוץ עובדים. מלא משמרות ריקות (מערכי עובדים ריקים []) בלבד — אל תשנה שיבוצים שכבר קיימים.

## עובדים
${JSON.stringify(empList, null, 2)}

## דרישות משמרות לפי יום
${JSON.stringify(shiftReqs, null, 2)}

## שיבוצים קיימים (לא לשנות)
${JSON.stringify(snap.schedule, null, 2)}

## כללים — חובה לעמוד בכולם
1. כל משמרת עם required:N חייבת לקבל בדיוק N עובדים שונים — לא פחות, לא יותר.
   דוגמה: required:2 → ["empId1","empId2"], required:1 → ["empId3"]
2. אסור לשבץ עובד שביום זה יש לו unavailable בבקשות
3. עובד עם canDoNights:false — אסור בשיבוץ לילה (isNight:true)
4. שמור 8 שעות מנוחה בין משמרות לאותו עובד באותו יום
5. אל תחרוג ממכסת maxShifts לעובד בסך כל הסידור
6. העדף עובדים שסימנו "high" ביום זה
7. פזר שוויונית — אל תשבץ עובד אחד יותר מדי
8. nightOwl:true — עדיפות גבוהה לשיבוץ לילה

## פורמט תגובה — JSON בלבד, ללא הסברים נוספים
{
  "schedule": { "YYYY-MM-DD": { "shiftId": ["empId1","empId2"] } },
  "log": [{ "type": "info|decision|dilemma", "message": "הסבר קצר בעברית" }]
}
החזר את הסידור המלא כולל שיבוצים קיימים ללא שינוי.`;

      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': anthropicKey.trim(),
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 4096,
          messages: [{ role: 'user', content: prompt }],
        }),
      });
      if (!resp.ok) {
        const errBody = await resp.json().catch(() => ({}));
        throw new Error(errBody.error?.message || `HTTP ${resp.status}`);
      }
      const data = await resp.json();
      const text = data.content[0].text;
      const jsonMatch = text.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error('לא נמצא JSON בתגובה');
      const result = JSON.parse(jsonMatch[0]);
      if (!result.schedule) throw new Error('פורמט תגובה שגוי');

      // השלמה: כל משמרת שקיבלה פחות עובדים מהנדרש — תמולא ע"י האלגוריתם
      const topUp = AE.generate({
        startDate: snap.range.start, endDate: snap.range.end,
        excluded: snap.excluded, existingSchedule: result.schedule, shiftSettings,
      });

      const ts = new Date().toISOString();
      const finalLog = [
        { timestamp: ts, type: 'info', message: 'שיבוץ AI בוצע על ידי Claude Sonnet 4.6' },
        ...(result.log || []).map(l => ({ timestamp: ts, ...l })),
        ...topUp.log.filter(l => l.type !== 'info').map(l => ({ ...l, timestamp: ts, message: '[השלמה] ' + l.message })),
      ];
      setDrafts(ds => ds.map(d => d.id === id ? { ...d, schedule: topUp.schedule, log: finalLog } : d));
    } catch (err) {
      console.error('Claude API error:', err);
      const ts = new Date().toISOString();
      setDrafts(ds => ds.map(d => d.id === id
        ? { ...d, log: [{ timestamp: ts, type: 'dilemma', message: `שגיאת AI: ${err.message}` }] }
        : d
      ));
    } finally {
      setGeneratingId(null);
    }
  };

  const renameDraft = (id, name) => updateDraft(id, () => ({ name }));
  const setDraftStatus = (id, s) => updateDraft(id, () => ({ status: s }));

  const assign = (dStr, shiftId, empId) => {
    if (!activeDraftId) return;
    updateDraft(activeDraftId, d => {
      const day = { ...(d.schedule[dStr] || {}) };
      const cur = day[shiftId] || [];
      if (cur.includes(empId)) return {};
      const capacity = AD.shiftDef(dStr, shiftId, shiftSettings)?.required ?? Infinity;
      if (cur.length >= capacity) return {};
      day[shiftId] = [...cur, empId];
      return { schedule: { ...d.schedule, [dStr]: day } };
    });
  };

  const remove = (dStr, shiftId, empId) => {
    if (!activeDraftId) return;
    updateDraft(activeDraftId, d => {
      const day = { ...(d.schedule[dStr] || {}) };
      day[shiftId] = (day[shiftId] || []).filter(id => id !== empId);
      return { schedule: { ...d.schedule, [dStr]: day } };
    });
  };

  const moveChip = (from, to, empId, copy) => {
    if (from.dStr === to.dStr && from.shiftId === to.shiftId) return;
    if (!activeDraftId) return;
    updateDraft(activeDraftId, d => {
      const toDay = d.schedule[to.dStr] || {};
      const toCur = toDay[to.shiftId] || [];
      if (toCur.includes(empId)) return {};
      const capacity = AD.shiftDef(to.dStr, to.shiftId, shiftSettings)?.required ?? Infinity;
      if (toCur.length >= capacity) return {};
      const next = { ...d.schedule };
      if (!copy) {
        const fromDay = { ...(next[from.dStr] || {}) };
        fromDay[from.shiftId] = (fromDay[from.shiftId] || []).filter(id => id !== empId);
        next[from.dStr] = fromDay;
      }
      const newToDay = { ...(next[to.dStr] || {}) };
      newToDay[to.shiftId] = [...toCur, empId];
      next[to.dStr] = newToDay;
      return { schedule: next };
    });
  };

  // סדר תצוגה של משמרות בתא של יום (ויזואלי בלבד) — נשמר ב-shiftSettings.dayOrder
  const reorderDayShift = (dStr, orderedKeys) => {
    setShiftSettings(s => ({ ...s, dayOrder: { ...(s.dayOrder || {}), [dStr]: orderedKeys } }));
  };

  const slotProps = {
    onAssign: assign, onRemove: remove, onMoveChip: moveChip,
    onDragChipStart: setDraggingEmp, onDragEnd: () => setDraggingEmp(null),
    onReorderShift: reorderDayShift,
  };

  const st = STATUS_META[status];

  return (
    <div className="app" dir="rtl">
      <header className="topbar">
        <HamburgerMenu screen={screen} onNavigate={setScreen} />
        <div className="brand">
          <span className="brand-mark" aria-hidden="true">⧉</span>
          <span className="brand-name">משמרות</span>
        </div>
        {screen === 'calendar' && (
          <div className="topbar-center">
            <div className="month-nav">
              <button className="month-nav-btn" onClick={() => navigateMonth(-1)} title="חודש קודם">‹</button>
              <h1 className="month-title">{AD.monthLabel(currentMonth)}</h1>
              <button className="month-nav-btn" onClick={() => navigateMonth(1)} title="חודש הבא">›</button>
            </div>
            <span className={'status-chip ' + st.cls}>{st.label}</span>
            {conflictCount > 0 && status !== 'preview' && (
              <span className="conflict-count">{conflictCount} קונפליקטים</span>
            )}
          </div>
        )}
        {screen !== 'calendar' && <div style={{flex:1}} />}
        <div className="topbar-actions">
          {syncStatus === 'loading' && <span className="sync-badge sync-loading"><span className="spin">↻</span> טוען…</span>}
          {syncStatus === 'saving'  && <span className="sync-badge sync-saving"><span className="spin">↻</span> שומר…</span>}
          {syncStatus === 'saved'   && <span className="sync-badge sync-saved">✓ נשמר</span>}
          {syncStatus === 'error'   && <span className="sync-badge sync-error" title="שגיאת סנכרון עם מסד הנתונים">⚠ שגיאת שמירה</span>}
          <button className={'topbar-nav-btn' + (shiftsDrawerOpen ? ' active' : '')}
            onClick={() => { setShiftsDrawerOpen(o => !o); setSettingsDrawerOpen(false); }}>
            🗓 משמרות
          </button>
          <button className={'topbar-nav-btn' + (settingsDrawerOpen ? ' active' : '')}
            onClick={() => { setSettingsDrawerOpen(o => !o); setShiftsDrawerOpen(false); }}>
            ⚙ הגדרות
          </button>
          {screen === 'calendar' && (
            <>
              <button className="btn" onClick={() => setLogOpen(true)} disabled={!currentDraft}>
                לוג AI{dilemmaCount > 0 && <span className="btn-badge">{dilemmaCount}</span>}
              </button>
              <button className="btn" onClick={() => AE.exportCsv(currentDraft?.schedule || {}, conflicts, currentMonth, shiftSettings)} disabled={!currentDraft || isGenerating}>
                ייצוא
              </button>
              {status === 'draft' && (
                <button className="btn btn-ai" onClick={runAI}>✦ שבץ אוטומטי</button>
              )}
              {status === 'draft' && (
                <button className="btn btn-final" onClick={() => setDraftStatus(activeDraftId, 'final')}>אישור ופרסום</button>
              )}
              {status === 'final' && (
                <button className="btn" onClick={() => setDraftStatus(activeDraftId, 'draft')}>חזרה לעריכה</button>
              )}
              <button className="btn btn-primary" onClick={() => setModalOpen(true)} disabled={isGenerating}>
                ✦ צור טיוטה
              </button>
            </>
          )}
        </div>
      </header>

      {screen === 'calendar' && monthDrafts.length > 0 && (
        <div className="drafts-bar">
          {monthDrafts.map(d => (
            <DraftTab key={d.id} draft={d} isActive={d.id === activeDraftId}
              onSelect={setActiveDraftId} onRename={renameDraft} />
          ))}
        </div>
      )}

      {screen === 'calendar' && status === 'final' && (
        <div className="final-banner">הסידור פורסם לעובדים והוא נעול לעריכה. לחצו ״חזרה לעריכה״ כדי לבצע שינויים.</div>
      )}

      <ShiftSettingsCtx.Provider value={shiftSettings}>
        {screen === 'employees' && <EmployeesScreen employees={employees} onEmployeesChange={setEmployees} />}
        {screen === 'requests'  && <RequestsScreen  employees={employees} requests={AD.REQUESTS} />}
        {screen === 'calendar'  && (
          <main className="layout">
            <section className="board">
              {!currentDraft ? (
                <div className="empty-state">
                  <div className="empty-card">
                    <div className="empty-mark" aria-hidden="true">⧉</div>
                    <h2 className="empty-title">אין עדיין סידור ל{AD.monthLabel(currentMonth)}</h2>
                    <p className="empty-sub">צרו טיוטה חדשה וה־AI ישבץ את העובדים לפי בקשות, מכסות וזמני מנוחה. לאחר מכן תוכלו לדייק את התוצאה בגרירה.</p>
                    <button className="btn btn-primary btn-lg" onClick={() => setModalOpen(true)}>✦ צור טיוטה חדשה</button>
                  </div>
                </div>
              ) : (
                <div className="board-inner">
                  <MonthView range={currentDraft.range} excluded={currentDraft.excluded} schedule={currentDraft.schedule}
                    conflicts={conflicts} editable={editable} draggingEmp={draggingEmp} selectedDate={selectedDate}
                    onSelectDate={d => setSelectedDate(cur => cur === d ? null : d)} slotProps={slotProps} />
                  {isGenerating && (
                    <div className="generating-overlay">
                      <div className="generating-card">
                        <span className="spinner" aria-hidden="true"></span>
                        <div>
                          <div className="generating-title">ה־AI מרכיב את הסידור…</div>
                          <div className="generating-sub">עוגנים ← זמינות ← מכסות ← זמני מנוחה ← העדפות</div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </section>

            <EmployeesSidePanel
              schedule={currentDraft?.schedule || {}} selectedDate={selectedDate} draggingEmp={draggingEmp}
              onDragEmpStart={setDraggingEmp} onDragEnd={() => setDraggingEmp(null)} editable={editable}
              apiKey={anthropicKey} employees={employees} onEmployeesChange={setEmployees}
              onAssign={assign} onRemove={remove} />
          </main>
        )}
      </ShiftSettingsCtx.Provider>

      <ShiftsDrawer open={shiftsDrawerOpen} onClose={() => setShiftsDrawerOpen(false)}
        settings={shiftSettings} onChange={setShiftSettings} />
      <SettingsDrawer open={settingsDrawerOpen} onClose={() => setSettingsDrawerOpen(false)}
        tweaks={t} onTweakChange={setTweak}
        apiKey={anthropicKey}
        onApiKeyChange={key => { setAnthropicKey(key); localStorage.setItem('anthropic-api-key', key); }} />

      <GenerateDraftModal open={modalOpen} onClose={() => setModalOpen(false)} onGenerate={createDraft}
        month={currentMonth}
        initialRange={currentDraft?.range || AE.defaultRange(currentMonth)}
        initialExcluded={[]} />
      <LogDrawer open={logOpen} log={currentDraft?.log || []} onClose={() => setLogOpen(false)} />

      <TweaksPanel>
        <TweakSection label="צבע" />
        <TweakColor label="צבע ראשי" value={t.accent} options={['#3D63C9', '#1F8A5B', '#7A5AE0', '#B5512E']}
          onChange={v => setTweak('accent', v)} />
        <TweakSection label="תצוגה" />
        <TweakRadio label="צפיפות הלוח" value={t.density} options={['רגילה', 'קומפקטית']}
          onChange={v => setTweak('density', v)} />
        <TweakToggle label="מצב כהה" value={t.dark} onChange={v => setTweak('dark', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
