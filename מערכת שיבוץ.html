<!DOCTYPE html>
<html lang="he" dir="rtl" data-theme="light" data-density="regular">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>משמרות — ניהול סידור עבודה</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231a2744'/%3E%3Crect x='4' y='4' width='24' height='7' rx='2.5' fill='%23F59E0B'/%3E%3Crect x='4' y='13' width='24' height='7' rx='2.5' fill='%233D63C9'/%3E%3Crect x='4' y='22' width='24' height='6' rx='2.5' fill='%237C3AED'/%3E%3Ccircle cx='9' cy='7.5' r='2' fill='white' opacity='.9'/%3E%3Ccircle cx='15' cy='7.5' r='2' fill='white' opacity='.9'/%3E%3Ccircle cx='9' cy='16.5' r='2' fill='white' opacity='.9'/%3E%3Ccircle cx='15' cy='16.5' r='2' fill='white' opacity='.9'/%3E%3Ccircle cx='9' cy='25' r='2' fill='white' opacity='.9'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Hebrew:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #3D63C9;
    --bg: oklch(0.965 0.006 250);
    --surface: oklch(0.995 0.002 250);
    --surface-2: oklch(0.975 0.005 250);
    --ink: oklch(0.24 0.015 255);
    --ink-2: oklch(0.48 0.02 255);
    --ink-3: oklch(0.62 0.015 255);
    --line: oklch(0.89 0.008 250);
    --line-soft: oklch(0.93 0.006 250);
    --ok: oklch(0.6 0.13 155);
    --warn: oklch(0.68 0.13 65);
    --danger: oklch(0.56 0.17 27);
    --ok-bg: oklch(0.96 0.03 155);
    --warn-bg: oklch(0.96 0.04 80);
    --danger-bg: oklch(0.95 0.03 27);
    --shadow: 0 1px 2px oklch(0.2 0.02 255 / 0.06), 0 4px 16px oklch(0.2 0.02 255 / 0.07);
    --r: 10px;
    --cell-pad: 8px;
    --slot-pad: 6px 8px;
    --chip-font: 12.5px;
    --day-min-h: 150px;
  }
  [data-theme="dark"] {
    --bg: oklch(0.21 0.012 255);
    --surface: oklch(0.26 0.012 255);
    --surface-2: oklch(0.30 0.012 255);
    --ink: oklch(0.93 0.005 255);
    --ink-2: oklch(0.72 0.01 255);
    --ink-3: oklch(0.58 0.01 255);
    --line: oklch(0.36 0.012 255);
    --line-soft: oklch(0.32 0.012 255);
    --ok-bg: oklch(0.32 0.05 155);
    --warn-bg: oklch(0.33 0.05 80);
    --danger-bg: oklch(0.32 0.05 27);
    --shadow: 0 1px 2px oklch(0 0 0 / 0.3), 0 4px 16px oklch(0 0 0 / 0.3);
  }
  [data-density="compact"] {
    --cell-pad: 5px;
    --slot-pad: 3px 6px;
    --chip-font: 11.5px;
    --day-min-h: 116px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans Hebrew', 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }
  .app { display: flex; flex-direction: column; height: 100vh; }
  button { font-family: inherit; cursor: pointer; }
  kbd { font-family: inherit; background: var(--surface-2); border: 1px solid var(--line); border-radius: 4px; padding: 0 4px; font-size: 11px; }

  /* ---------- סרגל עליון ---------- */
  .topbar {
    display: flex; align-items: center; gap: 20px;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .brand { display: flex; align-items: center; gap: 8px; }
  .brand-mark { color: var(--accent); font-size: 20px; line-height: 1; }
  .brand-name { font-weight: 700; font-size: 16px; letter-spacing: -0.01em; }
  .topbar-center { display: flex; align-items: center; gap: 12px; flex: 1; }
  .month-title { font-size: 17px; font-weight: 600; margin: 0; }
  .status-chip { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 999px; border: 1px solid transparent; }
  .st-preview { background: var(--surface-2); color: var(--ink-2); border-color: var(--line); }
  .st-generating { background: var(--warn-bg); color: var(--warn); }
  .st-draft { background: color-mix(in oklab, var(--accent) 12%, transparent); color: var(--accent); }
  .st-final { background: var(--ok-bg); color: var(--ok); }
  .conflict-count { font-size: 12px; font-weight: 600; color: var(--danger); background: var(--danger-bg); padding: 3px 10px; border-radius: 999px; }
  .topbar-actions { display: flex; align-items: center; gap: 8px; }

  /* ---------- סנכרון מסד נתונים ---------- */
  .sync-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11.5px; font-weight: 500;
    padding: 3px 9px; border-radius: 999px;
    border: 1px solid transparent; transition: all 0.2s;
    flex-shrink: 0;
  }
  .sync-loading { background: var(--surface-2); color: var(--ink-3); border-color: var(--line); }
  .sync-saving  { background: color-mix(in oklab, var(--accent) 12%, transparent); color: var(--accent); border-color: color-mix(in oklab, var(--accent) 30%, transparent); }
  .sync-saved   { background: var(--ok-bg); color: var(--ok); border-color: color-mix(in oklab, var(--ok) 30%, transparent); }
  .sync-error   { background: var(--danger-bg); color: var(--danger); border-color: color-mix(in oklab, var(--danger) 30%, transparent); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { display: inline-block; animation: spin 0.9s linear infinite; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 8px;
    border: 1px solid var(--line); background: var(--surface); color: var(--ink);
    font-size: 13px; font-weight: 500;
    transition: background 0.12s, border-color 0.12s;
  }
  .btn:hover:not(:disabled) { background: var(--surface-2); border-color: var(--ink-3); }
  .btn:disabled { opacity: 0.45; cursor: default; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: white; font-weight: 600; }
  .btn-primary:hover:not(:disabled) { background: color-mix(in oklab, var(--accent) 88%, black); border-color: color-mix(in oklab, var(--accent) 88%, black); }
  .btn-final { background: var(--ok); border-color: var(--ok); color: white; font-weight: 600; }
  .btn-final:hover:not(:disabled) { background: color-mix(in oklab, var(--ok) 88%, black); border-color: transparent; }
  .btn-ai { background: #7B1E2B; border-color: #7B1E2B; color: white; font-weight: 600; }
  .btn-ai:hover:not(:disabled) { background: #641722; border-color: #641722; }
  .btn-lg { padding: 11px 22px; font-size: 15px; }
  .btn-badge { background: var(--danger); color: white; font-size: 10.5px; font-weight: 700; border-radius: 999px; min-width: 17px; height: 17px; display: inline-flex; align-items: center; justify-content: center; padding: 0 4px; }
  .icon-btn { background: none; border: none; font-size: 20px; color: var(--ink-3); padding: 2px 8px; border-radius: 6px; }
  .icon-btn:hover { background: var(--surface-2); color: var(--ink); }

  .final-banner {
    background: var(--ok-bg); color: var(--ok);
    font-size: 13px; font-weight: 500; text-align: center;
    padding: 7px 16px; border-bottom: 1px solid color-mix(in oklab, var(--ok) 25%, transparent);
  }

  /* ---------- פריסה ---------- */
  .layout { display: flex; flex: 1; min-height: 0; }
  .board { flex: 1; min-width: 0; overflow: auto; padding: 16px; position: relative; }
  .board-inner { position: relative; min-height: 100%; }

  /* ---------- לוח חודשי ---------- */
  .month-header-row { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 6px; margin-bottom: 6px; }
  .month-header-cell { text-align: center; font-size: 12px; font-weight: 600; color: var(--ink-2); padding: 2px 0; }
  .month-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 6px; }

  .day {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r);
    padding: var(--cell-pad);
    min-height: var(--day-min-h);
    min-width: 0;
    display: flex; flex-direction: column; gap: 6px;
    transition: opacity 0.15s, box-shadow 0.15s, border-color 0.15s;
  }
  .day-out { background: transparent; border-color: var(--line-soft); min-height: 0; opacity: 0.5; }
  .day-num-out { color: var(--ink-3); }
  .day-weekend { background: var(--surface-2); }
  .day-selected { border-color: var(--accent); box-shadow: 0 0 0 2px color-mix(in oklab, var(--accent) 30%, transparent); }
  .day-dim { opacity: 0.35; }
  .day-glow { border-color: var(--ok); box-shadow: 0 0 0 2px color-mix(in oklab, var(--ok) 30%, transparent); }
  .day-excluded { background: repeating-linear-gradient(135deg, var(--surface-2), var(--surface-2) 6px, var(--surface) 6px, var(--surface) 12px); }
  .excluded-label { font-size: 11.5px; color: var(--ink-3); text-align: center; margin: auto 0; }

  .day-head { display: flex; align-items: baseline; gap: 6px; }
  .day-num { font-size: 15px; font-weight: 700; }
  .day-name { font-size: 11px; color: var(--ink-3); }
  .day-slots { display: flex; flex-direction: column; gap: 4px; flex: 1; }

  /* ---------- משבצת משמרת ---------- */
  .slot {
    border: 1px solid var(--line-soft);
    border-radius: 7px;
    padding: var(--slot-pad);
    background: var(--surface);
    display: flex; flex-direction: column; gap: 3px;
    transition: border-color 0.12s, background 0.12s;
  }
  .slot-over { border-color: var(--accent); background: color-mix(in oklab, var(--accent) 8%, var(--surface)); border-style: dashed; }
  .slot { min-width: 0; }
  .slot-head { display: flex; align-items: center; gap: 5px; min-width: 0; }
  .slot-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .slot-ok .slot-dot { background: var(--ok); }
  .slot-empty .slot-dot { background: var(--warn); }
  .slot-conflict .slot-dot { background: var(--danger); }
  .slot-name { font-size: 11.5px; font-weight: 600; color: var(--ink-2); flex-shrink: 0; }
  .slot-hours { font-size: 10.5px; color: var(--ink-3); margin-inline-start: auto; font-variant-numeric: tabular-nums; white-space: nowrap; overflow: hidden; min-width: 0; direction: ltr; unicode-bidi: embed; }
  .slot-placeholder { font-size: 11px; color: var(--ink-3); padding: 2px 0; }
  .slot-chips { display: flex; flex-direction: column; gap: 3px; min-width: 0; }

  /* גרירת משמרת לשינוי סדר תצוגה בתוך היום */
  .slot-head-grab { cursor: grab; }
  .slot-head-grab:active { cursor: grabbing; }
  .slot-dragging { opacity: 0.4; }
  .slot-reorder-over { outline: 2px dashed var(--accent); outline-offset: -2px; }

  /* ---------- צ'יפ עובד ---------- */
  .chip {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface-2);
    border: 1px solid var(--line-soft);
    border-radius: 999px;
    padding: 2px 6px 2px 4px;
    font-size: var(--chip-font);
    position: relative;
    min-width: 0;
    cursor: grab;
  }
  .chip:active { cursor: grabbing; }
  .chip-conflict { border-color: color-mix(in oklab, var(--danger) 50%, transparent); background: var(--danger-bg); }
  .chip-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .conflict-badge {
    background: var(--danger); color: white;
    width: 15px; height: 15px; border-radius: 50%;
    font-size: 10.5px; font-weight: 700;
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .chip-x {
    background: none; border: none; color: var(--ink-3);
    font-size: 14px; line-height: 1; padding: 0 2px;
    opacity: 0; transition: opacity 0.1s; flex-shrink: 0;
  }
  .chip:hover .chip-x { opacity: 1; }
  .chip-x:hover { color: var(--danger); }

  .avatar {
    border-radius: 50%; color: white; font-weight: 700;
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0; letter-spacing: -0.02em;
  }

  /* ---------- חלונית עובדים ---------- */
  .side-panel {
    width: 292px; flex-shrink: 0;
    background: var(--surface);
    border-inline-start: 1px solid var(--line);
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .side-head { display: flex; align-items: center; gap: 8px; padding: 14px 16px 8px; }
  .side-title { font-size: 15px; font-weight: 700; margin: 0; }
  .side-count { font-size: 11.5px; color: var(--ink-3); background: var(--surface-2); border-radius: 999px; padding: 1px 8px; }
  .side-tabs { display: flex; gap: 4px; padding: 0 16px 10px; }
  .side-tab {
    flex: 1; padding: 5px 4px; font-size: 12px; font-weight: 500;
    background: none; border: 1px solid var(--line); border-radius: 7px; color: var(--ink-2);
  }
  .side-tab.on { background: color-mix(in oklab, var(--accent) 11%, transparent); border-color: var(--accent); color: var(--accent); font-weight: 600; }
  .side-note { font-size: 12px; color: var(--ink-2); padding: 0 16px 8px; }
  .emp-list { flex: 1; overflow-y: auto; padding: 0 12px 12px; display: flex; flex-direction: column; gap: 6px; }

  .emp-card {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    background: var(--surface);
    border: 1px solid var(--line-soft);
    border-radius: var(--r);
    cursor: grab;
    transition: border-color 0.12s, box-shadow 0.12s;
  }
  .emp-card:hover { border-color: var(--ink-3); box-shadow: var(--shadow); }
  .emp-card:active { cursor: grabbing; }
  .emp-info { flex: 1; min-width: 0; }
  .emp-name-row { display: flex; align-items: center; gap: 5px; }
  .emp-name { font-weight: 600; font-size: 13px; }
  .anchor-tag { font-size: 11px; }
  .emp-meta { display: flex; align-items: center; gap: 6px; margin-top: 1px; }
  .emp-role { font-size: 11.5px; color: var(--ink-3); }
  .av-tag { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 999px; }
  .av-no { background: var(--danger-bg); color: var(--danger); }
  .av-high { background: var(--ok-bg); color: var(--ok); }
  .av-can { background: var(--warn-bg); color: var(--warn); }
  .emp-side { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
  .emp-count { font-size: 11.5px; color: var(--ink-2); font-variant-numeric: tabular-nums; }
  .emp-count-over { color: var(--danger); font-weight: 700; }
  .req-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .side-hint { font-size: 11px; color: var(--ink-3); padding: 10px 16px; border-top: 1px solid var(--line-soft); line-height: 1.6; }

  /* ---------- מצב ריק ---------- */
  .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; min-height: 60vh; }
  .empty-card { text-align: center; max-width: 420px; padding: 40px; }
  .empty-mark { font-size: 40px; color: var(--accent); opacity: 0.5; }
  .empty-title { font-size: 20px; font-weight: 700; margin: 12px 0 8px; }
  .empty-sub { color: var(--ink-2); line-height: 1.6; margin: 0 0 20px; }

  /* ---------- Overlay יצירה ---------- */
  .generating-overlay {
    position: absolute; inset: 0;
    background: color-mix(in oklab, var(--bg) 65%, transparent);
    backdrop-filter: blur(2px);
    display: flex; align-items: flex-start; justify-content: center;
    padding-top: 18vh; border-radius: var(--r); z-index: 5;
  }
  .generating-card {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 12px; padding: 18px 24px; box-shadow: var(--shadow);
  }
  .generating-title { font-weight: 700; font-size: 15px; }
  .generating-sub { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
  .spinner {
    width: 26px; height: 26px; border-radius: 50%;
    border: 3px solid var(--line); border-top-color: var(--accent);
    animation: spin 0.8s linear infinite; flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- מודל ---------- */
  .modal-backdrop, .drawer-backdrop {
    position: fixed; inset: 0; background: oklch(0.15 0.01 255 / 0.45);
    display: flex; align-items: center; justify-content: center; z-index: 50;
  }
  .modal {
    background: var(--surface); border-radius: 14px; box-shadow: var(--shadow);
    width: min(560px, calc(100vw - 32px)); max-height: calc(100vh - 64px);
    display: flex; flex-direction: column;
  }
  .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 0; }
  .modal-title { font-size: 17px; font-weight: 700; margin: 0; }
  .modal-body { padding: 16px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
  .modal-foot { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px 16px; border-top: 1px solid var(--line-soft); }
  .modal-summary { font-size: 12.5px; color: var(--ink-2); }
  .modal-actions { display: flex; gap: 8px; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field-row { display: flex; gap: 24px; }
  .field-label { font-size: 13px; font-weight: 600; }
  .field-sub { font-weight: 400; color: var(--ink-3); font-size: 12px; }
  .field-hint { font-size: 12px; color: var(--ink-3); }
  .month-pill { align-self: flex-start; background: var(--surface-2); border: 1px solid var(--line); border-radius: 8px; padding: 6px 14px; font-weight: 600; }
  .stepper { display: flex; align-items: center; gap: 8px; }
  .stepper-btn {
    width: 28px; height: 28px; border-radius: 7px;
    border: 1px solid var(--line); background: var(--surface);
    font-size: 16px; color: var(--ink); display: inline-flex; align-items: center; justify-content: center;
  }
  .stepper-btn:hover { background: var(--surface-2); }
  .stepper-val { min-width: 22px; text-align: center; font-weight: 700; font-variant-numeric: tabular-nums; }

  .exclude-cal { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 4px; }
  .exclude-cal-head { text-align: center; font-size: 10.5px; font-weight: 600; color: var(--ink-3); padding: 2px 0 4px; }
  .exclude-pill {
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--line); border-radius: 7px;
    background: var(--surface); padding: 5px 2px;
    transition: background 0.1s, opacity 0.1s;
    aspect-ratio: 1;
  }
  .exclude-pill.wknd { background: var(--surface-2); }
  .exclude-pill:hover { border-color: var(--ink-3); }
  .exclude-pill.off { opacity: 0.45; background: repeating-linear-gradient(135deg, var(--surface-2), var(--surface-2) 4px, var(--surface) 4px, var(--surface) 8px); text-decoration: line-through; }
  .exclude-pill-num { font-size: 13px; font-weight: 700; }
  .exclude-pill.out-of-month { opacity: 0.4; border-style: dashed; }

  /* ---------- לוג ---------- */
  .drawer-backdrop { justify-content: flex-start; }
  .drawer {
    background: var(--surface); height: 100%; width: min(420px, 90vw);
    border-inline-end: 1px solid var(--line);
    display: flex; flex-direction: column;
    box-shadow: var(--shadow);
  }
  .drawer-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 10px; border-bottom: 1px solid var(--line-soft); }
  .drawer-title { font-size: 16px; font-weight: 700; margin: 0; }
  .drawer-empty { padding: 24px 20px; color: var(--ink-3); }
  .log-list { list-style: none; margin: 0; padding: 12px 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .log-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 10px; border-radius: 8px; background: var(--surface-2);
    font-size: 13px; line-height: 1.5;
  }
  .log-type { font-size: 10.5px; font-weight: 700; border-radius: 999px; padding: 2px 8px; flex-shrink: 0; margin-top: 1px; }
  .log-info .log-type { background: color-mix(in oklab, var(--accent) 14%, transparent); color: var(--accent); }
  .log-dilemma .log-type { background: var(--warn-bg); color: var(--warn); }
  .log-decision .log-type { background: var(--danger-bg); color: var(--danger); }
  .log-msg { color: var(--ink); }

  /* ---------- ניווט חודשים ---------- */
  .month-nav { display: flex; align-items: center; gap: 2px; }
  .month-nav-btn { background: none; border: none; font-size: 20px; color: var(--ink-3); padding: 0 5px; border-radius: 6px; line-height: 1.2; }
  .month-nav-btn:hover { background: var(--surface-2); color: var(--ink); }

  /* ---------- ניווט אייקונים בפאנל ---------- */
  .side-icon-nav { display: flex; border-bottom: 1px solid var(--line); flex-shrink: 0; }

(function() {
  var errors = [];
  function show() {
    var box = document.getElementById('_err_overlay');
    if (!box) {
      box = document.createElement('div');
      box.id = '_err_overlay';
      box.style.cssText = 'position:fixed;inset:0;background:#1a0a0a;color:#ff8080;font:13px/1.6 monospace;padding:24px;z-index:99999;overflow:auto;white-space:pre-wrap;direction:ltr';
      box.innerHTML = '<b style="font-size:16px;color:#ff4444">⚠ שגיאת JavaScript</b>\n\n';
      document.body.appendChild(box);
    }
    box.innerHTML = '<b style="font-size:16px;color:#ff4444">⚠ שגיאת JavaScript</b>\n\n' + errors.join('\n\n---\n\n');
  }
  window.addEventListener('error', function(e) {
    errors.push((e.filename ? e.filename.split('/').pop() + ':' + e.lineno + ' ' : '') + (e.message || e));
    show();
  });
  window.addEventListener('unhandledrejection', function(e) {
    errors.push('Unhandled Promise: ' + (e.reason?.stack || e.reason?.message || String(e.reason)));
    show();
  });
})();
</script>

<!-- ============ נתוני דמו — מוקד שירות 24/7, יולי 2026 ============ -->
<script>
(function () {
  const MONTH = '2026-07';

  const HEB_DAYS = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];
  const HEB_DAYS_SHORT = ['א׳', 'ב׳', 'ג׳', 'ד׳', 'ה׳', 'ו׳', 'ש׳'];
  const HEB_MONTHS = ['ינואר', 'פברואר', 'מרץ', 'אפריל', 'מאי', 'יוני', 'יולי', 'אוגוסט', 'ספטמבר', 'אוקטובר', 'נובמבר', 'דצמבר'];

  const pad = (n) => String(n).padStart(2, '0');
  const parseDate = (s) => { const [y, m, d] = s.split('-').map(Number); return new Date(y, m - 1, d); };
  const dateStr = (d) => `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
  const addDays = (s, n) => { const d = parseDate(s); d.setDate(d.getDate() + n); return dateStr(d); };
  const weekdayOf = (s) => parseDate(s).getDay();
  const dayLabel = (s) => HEB_DAYS[weekdayOf(s)];
  const shortDate = (s) => { const d = parseDate(s); return `${d.getDate()}/${d.getMonth() + 1}`; };
  const monthLabel = (ym) => { const [y, m] = ym.split('-').map(Number); return `${HEB_MONTHS[m - 1]} ${y}`; };

  const WEEKDAY_SHIFTS = [
    { id: 'morning', name: 'בוקר', start: '07:00', end: '15:00' },
    { id: 'evening', name: 'ערב', start: '15:00', end: '23:00' },
    { id: 'night', name: 'לילה', start: '23:00', end: '07:00' },
  ];
  const WEEKEND_SHIFTS = [
    { id: 'morning', name: 'בוקר', start: '07:00', end: '15:00' },
    { id: 'short', name: 'קצר', start: '15:00', end: '19:00' },
    { id: 'night', name: 'לילה', start: '19:00', end: '07:00' },
  ];
  const getBase = (dayStr, settings) => {
    const wd = weekdayOf(dayStr);
    if (settings) {
      if (wd === 6) return settings.saturday || settings.weekend || WEEKEND_SHIFTS;
      if (wd === 5) return settings.friday  || settings.weekend || WEEKEND_SHIFTS;
      return settings.weekday;
    }
    return (wd === 5 || wd === 6) ? WEEKEND_SHIFTS : WEEKDAY_SHIFTS;
  };

  const shiftKey = (sh) => sh.id + (sh.continuation ? '@' + sh.originDate : '');

  // מיון לתצוגה בלבד — לא משפיע על שום לוגיקה
  const orderShifts = (list, order) => {
    if (!order || !order.length) return list;
    return [...list].sort((a, b) => {
      const ia = order.indexOf(shiftKey(a)), ib = order.indexOf(shiftKey(b));
      return (ia === -1 ? order.length + list.indexOf(a) : ia)
           - (ib === -1 ? order.length + list.indexOf(b) : ib);
    });
  };

  const shiftTypesFor = (s, settings) => {
    const special = settings?.special || [];

    // special shifts: direct or continuation
    const directSpecial = special.filter(sp => sp.date === s);
    const contSpecial = [];
    special.forEach(sp => {
      const span = sp.daysSpan || 1;
      for (let i = 1; i < span; i++) {
        if (addDays(sp.date, i) === s) {
          contSpecial.push({ ...sp, continuation: true, originDate: sp.date });
        }
      }
    });
    if (directSpecial.length || contSpecial.length) return [...directSpecial, ...contSpecial];

    const base = getBase(s, settings);

    // multi-day continuation from previous days
    const contRegular = [];
    for (let i = 1; i <= 2; i++) {
      const prev = addDays(s, -i);
      getBase(prev, settings).filter(sh => (sh.daysSpan || 1) > i).forEach(sh => {
        if (!contRegular.find(c => c.id === sh.id && c.originDate === prev)) {
          contRegular.push({ ...sh, continuation: true, originDate: prev });
        }
      });
    }
    return [...base, ...contRegular];
  };
  const shiftDef = (s, shiftId, settings) => shiftTypesFor(s, settings).find((x) => x.id === shiftId);

  const shiftTimes = (s, shift) => {
    const mk = (dStr, hm) => { const d = parseDate(dStr); const [h, m] = hm.split(':').map(Number); d.setHours(h, m, 0, 0); return d; };
    const start = mk(s, shift.start);
    let end = mk(s, shift.end);
    if (end <= start) end = mk(addDays(s, 1), shift.end);
    return { start, end };
  };

  // רשימת העובדים מנוהלת ב-state של האפליקציה ונשמרת ב-Supabase/localStorage
  const EMPLOYEES = [];

  const REQUESTS = {};

  const reqOf = (empId) => REQUESTS[empId] || null;
  const availabilityOn = (empId, dStr) => {
    const r = REQUESTS[empId];
    if (!r) return null;
    if (r.unavailable.includes(dStr)) return 'unavailable';
    if (r.high.includes(dStr)) return 'high';
    if (r.can.includes(dStr)) return 'can';
    return null;
  };

  // קורא מהרשימה החיה (window.ShiftData.EMPLOYEES) שמסונכרנת מה-state, לא מהקבוע המקורי
  const empById = (id) => (window.ShiftData?.EMPLOYEES || EMPLOYEES).find((e) => e.id === id);
  const initials = (name) => (name || '').split(' ').filter(Boolean).map((w) => w[0]).slice(0, 2).join('');

  // ---- משמרות קבועות (weekday: 0=ראשון … 6=שבת) ----
  const FIXED_SHIFTS = [];

  window.ShiftData = {
    MONTH, HEB_DAYS, HEB_DAYS_SHORT, EMPLOYEES, REQUESTS, FIXED_SHIFTS,
    pad, parseDate, dateStr, addDays, weekdayOf, dayLabel, shortDate, monthLabel,

<!-- ============ מנוע שיבוץ + זיהוי קונפליקטים + ייצוא ============ -->
<script>
(function () {
  const D = window.ShiftData;
  const MIN_REST_H = 8;

  const listDates = (startStr, endStr) => {
    const out = [];
    let cur = startStr;
    while (cur <= endStr) { out.push(cur); cur = D.addDays(cur, 1); }
    return out;
  };

  const defaultRange = (ym) => {
    const [y, m] = ym.split('-').map(Number);
    const last = new Date(y, m, 0).getDate();
    return { start: `${ym}-01`, end: `${ym}-${D.pad(last)}` };
  };

  const hash = (s) => { let h = 0; for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) % 997; return h / 997; };

  const gapHours = (prevEnd, nextStart) => (nextStart - prevEnd) / 36e5;

  // מייצר סידור ראשוני עם משמרות קבועות בלבד
  function applyFixed(dates, fixed, shiftSettings = null) {
    const schedule = {};
    dates.forEach((dStr) => {
      const wd = D.weekdayOf(dStr);
      if (!schedule[dStr]) schedule[dStr] = {};
      D.shiftTypesFor(dStr, shiftSettings).forEach((shift) => {
        if (shift.continuation) return; // data lives at originDate
        const emps = fixed
          .filter((f) => f.weekday === wd && f.shiftId === shift.id && D.availabilityOn(f.empId, dStr) !== 'unavailable')
          .map((f) => f.empId);
        schedule[dStr][shift.id] = emps;
      });
    });
    return schedule;
  }

  // ממלא משבצות ריקות בלבד — שומר על שיבוצים קיימים (קבועים + ידניים)
  function generate({ startDate, endDate, excluded = [], existingSchedule = {}, shiftSettings = null }) {
    const dates = listDates(startDate, endDate).filter((d) => !excluded.includes(d));
    const schedule = {};
    const log = [];
    const counts = {}; const lastEnd = {};
    D.EMPLOYEES.forEach((e) => { counts[e.id] = 0; lastEnd[e.id] = null; });
    const now = () => new Date().toISOString();
    const addLog = (type, message) => log.push({ timestamp: now(), type, message });

    // העתק שיבוצים קיימים וספור אותם
    dates.forEach((dStr) => {
      schedule[dStr] = { ...(existingSchedule[dStr] || {}) };
      D.shiftTypesFor(dStr, shiftSettings).forEach((shift) => {
        if (shift.continuation) return;
        (schedule[dStr][shift.id] || []).forEach((empId) => {
          counts[empId] = (counts[empId] || 0) + 1;
          lastEnd[empId] = D.shiftTimes(dStr, shift).end;
        });
      });
    });

    addLog('info', `התחלת שיבוץ אוטומטי: ${D.shortDate(startDate)}–${D.shortDate(endDate)}, ${dates.length} ימים`);
    excluded.forEach((d) => addLog('info', `יום ${D.shortDate(d)} הוחרג מהסידור`));

    dates.forEach((dStr) => {
      D.shiftTypesFor(dStr, shiftSettings).forEach((shift) => {
        if (shift.continuation) return;
        const required = shift.required || 1;
        const needed = required - (schedule[dStr][shift.id] || []).length;
        if (needed <= 0) return;

        const t = D.shiftTimes(dStr, shift);

        for (let slot = 0; slot < needed; slot++) {
          const alreadyIn = schedule[dStr][shift.id] || [];
          const cands = D.EMPLOYEES.filter((e) => {
            if (alreadyIn.includes(e.id)) return false;
            if (D.availabilityOn(e.id, dStr) === 'unavailable') return false;
            if (counts[e.id] >= e.max) return false;
            if (shift.id === 'night' && !e.nights) return false;
            return true;
          });
          const clean = cands.filter((e) => !lastEnd[e.id] || gapHours(lastEnd[e.id], t.start) >= MIN_REST_H);
          const pool = clean.length ? clean : cands;

          if (!pool.length) {
            if (slot === 0) addLog('dilemma', `אין עובד זמין למשמרת ${shift.name} ב־${D.shortDate(dStr)}`);
            else addLog('dilemma', `אין עובד נוסף זמין למשמרת ${shift.name} ב־${D.shortDate(dStr)} (שובץ ${slot}/${required})`);
            break;
          }

          const score = (e) => {
            const av = D.availabilityOn(e.id, dStr);
            let s = 0;
            if (av === 'high') s += 6;
            if (av === 'can') s += 2;
            if (e.anchor) s += 3;
            if (e.nightOwl && shift.id === 'night') s += 5;
            s -= counts[e.id] * 0.9;
            s += hash(e.id + dStr + shift.id + slot) * 0.5;
            return s;
          };
          const best = pool.slice().sort((a, b) => score(b) - score(a))[0];
          const restViolation = !clean.includes(best);

          schedule[dStr][shift.id] = [...alreadyIn, best.id];
          counts[best.id] += 1;
          lastEnd[best.id] = t.end;

          const av = D.availabilityOn(best.id, dStr);
          if (restViolation) addLog('decision', `שובץ ${best.name} ל${shift.name} ב־${D.shortDate(dStr)} בחריגת מנוחה — אין חלופה`);
          else if (av === 'high') addLog('info', `שובץ ${best.name} ל${shift.name} ב־${D.shortDate(dStr)} לפי בקשה בעדיפות גבוהה`);
        }
      });
    });

    const total = Object.values(schedule).reduce((n, day) => n + Object.values(day).filter((a) => a.length).length, 0);
    addLog('info', `השיבוץ הושלם: ${total} משמרות אוישו`);
    return { schedule, log };
  }

  function detectConflicts(schedule, shiftSettings = null) {
    const issues = {};
    const add = (d, sh, emp, msg) => {
      const k = `${d}|${sh}|${emp}`;
      (issues[k] = issues[k] || []).push(msg);
    };

    const byEmp = {};
    Object.keys(schedule).sort().forEach((dStr) => {
      Object.entries(schedule[dStr]).forEach(([shiftId, emps]) => {
        const shift = D.shiftDef(dStr, shiftId, shiftSettings);
        if (!shift) return;
        const t = D.shiftTimes(dStr, shift);
        emps.forEach((empId) => {
          (byEmp[empId] = byEmp[empId] || []).push({ dStr, shiftId, shift, ...t });
          if (D.availabilityOn(empId, dStr) === 'unavailable') {
            add(dStr, shiftId, empId, 'שובץ ביום שסומן ״לא יכול״');
          }
        });
      });
    });

    Object.entries(byEmp).forEach(([empId, list]) => {
      list.sort((a, b) => a.start - b.start);
      const emp = D.empById(empId);
      for (let i = 1; i < list.length; i++) {
        const g = gapHours(list[i - 1].end, list[i].start);
        if (g < 0) add(list[i].dStr, list[i].shiftId, empId, 'חפיפת שעות עם משמרת אחרת');
        else if (g < MIN_REST_H) add(list[i].dStr, list[i].shiftId, empId, `מנוחה של ${Math.round(g)} ש׳ בלבד מהמשמרת הקודמת (מינ׳ ${MIN_REST_H})`);
      }
      if (emp && list.length > emp.max) {
        list.slice(emp.max).forEach((a) => add(a.dStr, a.shiftId, empId, `חריגה ממכסה חודשית (${emp.max} משמרות)`));
      }
    });
    return issues;
  }

  const countShifts = (schedule, empId) => {
    let n = 0;
    Object.values(schedule).forEach((day) => Object.values(day).forEach((emps) => { if (emps.includes(empId)) n++; }));
    return n;
  };

  function exportCsv(schedule, conflicts, month, shiftSettings = null) {
    const rows = [['תאריך', 'יום בשבוע', 'סוג משמרת', 'שם עובד', 'שעת התחלה', 'שעת סיום', 'חריגות']];
    Object.keys(schedule).sort().forEach((dStr) => {
      D.shiftTypesFor(dStr, shiftSettings).forEach((shift) => {
        const emps = schedule[dStr][shift.id] || [];
        if (!emps.length) {
          rows.push([dStr, D.dayLabel(dStr), shift.name, '— לא מאויש —', shift.start, shift.end, '']);
        } else {
          emps.forEach((empId) => {
            const emp = D.empById(empId);
            const c = (conflicts[`${dStr}|${shift.id}|${empId}`] || []).join('; ');
            rows.push([dStr, D.dayLabel(dStr), shift.name, emp ? emp.name : empId, shift.start, shift.end, c]);
          });
        }
      });
    });
    const csv = '﻿' + rows.map((r) => r.map((c) => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\r\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `סידור-עבודה-${month || D.MONTH}.csv`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 2000);
  }

  window.ShiftEngine = { listDates, defaultRange, applyFixed, generate, detectConflicts, countShifts, exportCsv, MIN_REST_H, gapHours };

})();
</script>

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {

        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);

  if (!fitsAsSegments) {
    return (
      <TweakRow label={label}>
        <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
          {options.map((o) => {
            const v = typeof o === 'object' ? o.value : o;
            const l = typeof o === 'object' ? o.label : o;
            return <option key={v} value={v}>{l}</option>;
          })}
        </select>
      </TweakRow>
    );
  }

  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (

               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

<!-- ============ MonthView — לוח חודשי עם Drag & Drop ============ -->
<script type="text/babel">
const D = window.ShiftData;
const E = window.ShiftEngine;

function Avatar({ emp, size = 22 }) {
  return (
    <span className="avatar" style={{ width: size, height: size, fontSize: size * 0.42, background: emp.color }} title={emp.name}>
      {D.initials(emp.name)}
    </span>
  );
}

function ShiftChip({ emp, dStr, shiftId, conflicts, editable, onRemove, onDragChipStart, onDragEnd }) {
  const key = `${dStr}|${shiftId}|${emp.id}`;
  const issues = conflicts[key] || [];
  const [showTip, setShowTip] = React.useState(false);

  const handleDragStart = (e) => {
    e.stopPropagation();
    e.dataTransfer.setData('text/plain', JSON.stringify({ kind: 'chip', empId: emp.id, from: { dStr, shiftId } }));
    e.dataTransfer.effectAllowed = 'copyMove';
    onDragChipStart(emp.id);
  };

  return (
    <div
      className={'chip' + (issues.length ? ' chip-conflict' : '')}
      draggable={editable}
      onDragStart={editable ? handleDragStart : undefined}
      onDragEnd={onDragEnd}
      title={issues.length ? undefined : emp.name}
    >
      <Avatar emp={emp} size={20} />
      <span className="chip-name">{emp.name}</span>
      {issues.length > 0 && (
        <span className="conflict-tip-wrap"
          onMouseEnter={() => setShowTip(true)}
          onMouseLeave={() => setShowTip(false)}>
          <span className="conflict-badge">!</span>
          {showTip && (
            <div className="conflict-tip" role="tooltip">
              {issues.map((iss, i) => (
                <div key={i} className="conflict-tip-row">
                  <span style={{flexShrink:0}}>⚠</span>
                  <span>{iss}</span>
                </div>
              ))}
            </div>
          )}
        </span>
      )}
      {editable && (
        <button className="chip-x" title="הסרה מהמשמרת" onClick={(e) => { e.stopPropagation(); onRemove(dStr, shiftId, emp.id); }}>×</button>
      )}
    </div>
  );
}

function ShiftSlot({ dStr, shift, emps, conflicts, editable, draggingEmp, isContinuation, onAssign, onRemove, onMoveChip, onDragChipStart, onDragEnd, slotKey, slotDragKey, onSlotDragStart, onSlotDragEnd, onSlotDropReorder }) {
  const [over, setOver] = React.useState(false);
  const hasConflict = emps.some((id) => (conflicts[`${dStr}|${shift.id}|${id}`] || []).length);
  const required = shift.required || 1;
  const stateCls = hasConflict ? 'slot-conflict' : emps.length === 0 ? 'slot-empty' : emps.length < required ? 'slot-partial' : 'slot-ok';

  const atCapacity = emps.length >= required;
  // גרירת משמרת (סידור מחדש) פעילה בתא הזה
  const slotDragActive = slotDragKey != null;
  const isBeingDragged = slotDragKey === slotKey;

  const handleDrop = (e) => {
    e.preventDefault(); e.stopPropagation(); setOver(false);
    if (!editable) return;
    let payload;
    try { payload = JSON.parse(e.dataTransfer.getData('text/plain')); } catch { return; }
    if (!payload) return;
    if (payload.kind === 'slot') { if (onSlotDropReorder) onSlotDropReorder(); return; }
    if (atCapacity) return;
    if (payload.kind === 'emp') onAssign(dStr, shift.id, payload.empId);
    else if (payload.kind === 'chip') onMoveChip(payload.from, { dStr, shiftId: shift.id }, payload.empId, e.shiftKey);
  };

  return (
    <div
      className={`slot ${stateCls}` + (over && editable ? (slotDragActive ? ' slot-reorder-over' : ' slot-over') : '') + (isContinuation ? ' slot-continuation' : '') + (isBeingDragged ? ' slot-dragging' : '')}
      onDragOver={(e) => {
        if (!editable) return;
        if (slotDragActive) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; if (!isBeingDragged) setOver(true); return; }
        if (!atCapacity) { e.preventDefault(); e.dataTransfer.dropEffect = e.shiftKey ? 'copy' : 'move'; setOver(true); }
      }}
      onDragLeave={() => setOver(false)}
      onDrop={handleDrop}
    >
      <div
        className={'slot-head' + (editable && onSlotDragStart ? ' slot-head-grab' : '')}
        draggable={editable && !!onSlotDragStart}
        onDragStart={(e) => {
          e.stopPropagation();
          e.dataTransfer.setData('text/plain', JSON.stringify({ kind: 'slot', key: slotKey }));
          e.dataTransfer.effectAllowed = 'move';
          onSlotDragStart && onSlotDragStart(slotKey);
        }}
        onDragEnd={() => onSlotDragEnd && onSlotDragEnd()}
        title={editable ? 'גררו לשינוי סדר המשמרות ביום' : undefined}
      >
        <span className="slot-dot" aria-hidden="true"></span>
        <span className="slot-name">{shift.name}</span>
        <span className="slot-hours">{shift.start}–{shift.end}</span>
      </div>
      {emps.length === 0 ? (
        <div className="slot-placeholder">{editable ? 'גררו עובד לכאן' : 'לא מאויש'}</div>
      ) : (
        <div className="slot-chips">
          {emps.map((id) => {
            const emp = D.empById(id);
            return emp && (
              <ShiftChip key={id} emp={emp} dStr={dStr} shiftId={shift.id} conflicts={conflicts}
                editable={editable} onRemove={onRemove} onDragChipStart={onDragChipStart} onDragEnd={onDragEnd} />
            );
          })}
        </div>
      )}
    </div>
  );
}

function DayCard({ dStr, inMonth, excluded, schedule, conflicts, editable, draggingEmp, selected, onSelect, slotProps }) {
  const wd = D.weekdayOf(dStr);
  const isWeekend = wd === 5 || wd === 6;
  const day = schedule[dStr] || {};
  const shiftSettings = React.useContext(window.ShiftSettingsCtx);
  const [slotDragKey, setSlotDragKey] = React.useState(null);

  // סדר תצוגה בלבד — הרשימה הקנונית (shiftTypesFor) נשארת ללא שינוי עבור כל הלוגיקה
  const dayShifts = D.orderShifts(D.shiftTypesFor(dStr, shiftSettings), shiftSettings?.dayOrder?.[dStr]);

  // הזזת המשמרת הנגררת למיקום של משמרת היעד
  const reorderTo = (targetKey) => {
    if (!slotDragKey || slotDragKey === targetKey || !slotProps.onReorderShift) return;
    const keys = dayShifts.map(D.shiftKey);
    const from = keys.indexOf(slotDragKey), to = keys.indexOf(targetKey);
    if (from < 0 || to < 0) return;
    keys.splice(from, 1);
    keys.splice(to, 0, slotDragKey);
    slotProps.onReorderShift(dStr, keys);
  };

  let availCls = '';
  if (draggingEmp) {
    const av = D.availabilityOn(draggingEmp, dStr);
    if (av === 'unavailable') availCls = ' day-dim';
    else if (av === 'high') availCls = ' day-glow';
  }

  if (excluded) {
    return (
      <div className={'day day-excluded' + (isWeekend ? ' day-weekend' : '')}>
        <div className="day-head">
          <span className="day-num">{D.parseDate(dStr).getDate()}</span>
          <span className="day-name">{D.dayLabel(dStr)}</span>
        </div>
        <div className="excluded-label">מוחרג מהסידור</div>
      </div>
    );
  }

  return (
    <div
      className={'day' + (isWeekend ? ' day-weekend' : '') + (selected ? ' day-selected' : '') + availCls}
      onClick={() => onSelect(dStr)}
    >
      <div className="day-head">
        <span className="day-num">{D.parseDate(dStr).getDate()}</span>
        <span className="day-name">{D.dayLabel(dStr)}</span>
      </div>
      <div className="day-slots">
        {dayShifts.map((shift) => {
          const dataDStr = shift.continuation ? shift.originDate : dStr;
          const dayData = schedule[dataDStr] || {};
          const key = D.shiftKey(shift);
          return (
            <ShiftSlot key={key}
              dStr={dataDStr} shift={shift} emps={dayData[shift.id] || []}
              isContinuation={!!shift.continuation}
              conflicts={conflicts} editable={editable} draggingEmp={draggingEmp} {...slotProps}
              slotKey={key} slotDragKey={slotDragKey}
              onSlotDragStart={setSlotDragKey}
              onSlotDragEnd={() => setSlotDragKey(null)}
              onSlotDropReorder={() => { reorderTo(key); setSlotDragKey(null); }} />
          );
        })}
      </div>
    </div>
  );
}

function MonthView({ range, excluded, schedule, conflicts, editable, draggingEmp, selectedDate, onSelectDate, slotProps }) {
  const cells = React.useMemo(() => {
    let cur = range.start;
    while (D.weekdayOf(cur) !== 0) cur = D.addDays(cur, -1);
    let end = range.end;
    while (D.weekdayOf(end) !== 6) end = D.addDays(end, 1);
    return E.listDates(cur, end).map((dStr) => ({ dStr, inRange: dStr >= range.start && dStr <= range.end }));
  }, [range.start, range.end]);

  return (
    <div className="month-wrap">
      <div className="month-header-row">
        {D.HEB_DAYS.map((d) => <div key={d} className="month-header-cell">{d}</div>)}
      </div>
      <div className="month-grid">
        {cells.map(({ dStr, inRange }) =>
          inRange ? (
            <DayCard key={dStr} dStr={dStr} inMonth excluded={excluded.includes(dStr)}
              schedule={schedule} conflicts={conflicts} editable={editable} draggingEmp={draggingEmp}
              selected={selectedDate === dStr} onSelect={onSelectDate} slotProps={slotProps} />
          ) : (
            <div key={dStr} className="day day-out">
              <div className="day-head"><span className="day-num day-num-out">{D.parseDate(dStr).getDate()}</span></div>
            </div>
          )
        )}
      </div>
    </div>
  );
}

Object.assign(window, { Avatar, ShiftChip, ShiftSlot, DayCard, MonthView });
</script>

        const emp = (employees || []).find(e => e.id === id);
        if (!emp) return `לא נמצא עובד עם id "${id}"`;
        onEmployeesChange(prev => prev.map(e => e.id === id ? { ...e, ...fields } : e));
        return `פרטי "${emp.name}" עודכנו`;
      }
      case 'remove_employee': {
        const emp = (employees || []).find(e => e.id === input.id);
        if (!emp) return `לא נמצא עובד עם id "${input.id}"`;
        onEmployeesChange(prev => prev.filter(e => e.id !== input.id));
        return `"${emp.name}" הוסר`;
      }
      case 'assign_shift': {
        const { date, shiftId, empId } = input;
        if (!editable || !onAssign) return 'אי אפשר לשבץ כרגע — אין טיוטה פעילה במצב עריכה (ייתכן שהסידור פורסם).';
        const emp = (employees || []).find(e => e.id === empId);
        if (!emp) return `לא נמצא עובד עם id "${empId}"`;
        const def = PD.shiftDef(date, shiftId, shiftSettings);
        if (!def) return `לא קיימת משמרת "${shiftId}" בתאריך ${date}`;
        const sched = schedRef.current || schedule || {};
        const cur = (sched[date] || {})[shiftId] || [];
        if (cur.includes(empId)) return `"${emp.name}" כבר משובץ במשמרת זו`;
        if (cur.length >= (def.required ?? Infinity)) return `המשמרת "${def.name}" בתאריך ${date} מלאה (${def.required} עובדים)`;
        onAssign(date, shiftId, empId);
        if (schedRef.current) {
          schedRef.current[date] = { ...(schedRef.current[date] || {}), [shiftId]: [...cur, empId] };
        }
        return `"${emp.name}" שובץ ל"${def.name}" בתאריך ${date}`;
      }
      case 'unassign_shift': {
        const { date, shiftId, empId } = input;
        if (!editable || !onRemove) return 'אי אפשר לערוך כרגע — אין טיוטה פעילה במצב עריכה.';
        const emp = (employees || []).find(e => e.id === empId);
        const sched = schedRef.current || schedule || {};
        const cur = (sched[date] || {})[shiftId] || [];
        if (!cur.includes(empId)) return `העובד אינו משובץ במשמרת "${shiftId}" בתאריך ${date}`;
        onRemove(date, shiftId, empId);
        if (schedRef.current) {
          schedRef.current[date] = { ...(schedRef.current[date] || {}), [shiftId]: cur.filter(id => id !== empId) };
        }
        return `"${emp?.name || empId}" הוסר מהמשמרת בתאריך ${date}`;
      }
      default: return 'כלי לא מוכר';
    }
  };

  const send = async () => {
    const q = input.trim();
    if (!q || loading) return;
    setInput('');
    setMsgs(prev => [...prev, { from: 'user', text: q }]);

    if (!apiKey) {
      setMsgs(prev => [...prev, { from: 'ai', text: 'כדי להשתמש בצ׳אט יש להזין מפתח API בהגדרות (⚙).' }]);
      return;
    }

    setLoading(true);
    try {
      const empList = (employees || PD.EMPLOYEES).map(e => ({
        id: e.id, name: e.name, role: e.role, maxShifts: e.max,
        canDoNights: !!e.nights, anchor: !!e.anchor, requests: PD.reqOf(e.id) || null,
      }));
      const conflicts = schedule ? Object.keys(PE.detectConflicts(schedule)).length : 0;
      schedRef.current = JSON.parse(JSON.stringify(schedule || {}));
      const shiftBrief = (arr) => (arr || []).map(s => ({ id: s.id, name: s.name, start: s.start, end: s.end, required: s.required }));
      const systemPrompt = `אתה עוזר לניהול סידור עבודה. ענה בעברית בתמציתיות.
אתה יכול לקרוא מידע ולבצע פעולות: הוספת/עריכת/הסרת עובדים, שיבוץ והסרת עובדים ממשמרות.

עובדים נוכחיים:
${JSON.stringify(empList, null, 2)}

משמרות מוגדרות (לפי סוג יום):
ימי חול (א׳–ה׳): ${JSON.stringify(shiftBrief(shiftSettings?.weekday))}
שישי: ${JSON.stringify(shiftBrief(shiftSettings?.friday))}
שבת: ${JSON.stringify(shiftBrief(shiftSettings?.saturday))}
${(shiftSettings?.special || []).length ? 'מיוחדות: ' + JSON.stringify((shiftSettings.special || []).map(s => ({ id: s.id, name: s.name, date: s.date, required: s.required }))) : ''}

סידור עבודה (תאריך → משמרת → מזהי עובדים):
${JSON.stringify(schedule || {}, null, 2)}

כללי שיבוץ: אל תשבץ עובד עם unavailable ביום זה, אל תשבץ עובד ללא canDoNights למשמרת לילה, ואל תחרוג ממכסת maxShifts.
${editable ? '' : 'שים לב: הסידור נעול כרגע לעריכה — אי אפשר לשבץ או להסיר משמרות.'}
יום נבחר: ${selectedDate || 'לא נבחר'} | קונפליקטים: ${conflicts}`;

      const history = msgs.filter(m => m.from !== 'system')
        .map(m => ({ role: m.from === 'user' ? 'user' : 'assistant', content: m.text }));

      let loopMsgs = [...history, { role: 'user', content: q }];
      let finalReply = '';

      for (let i = 0; i < 10; i++) {
        const resp = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey.trim(),
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-6',
            max_tokens: 2048,
            system: systemPrompt,
            tools: TOOLS,
            messages: loopMsgs,
          }),
        });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.error?.message || `HTTP ${resp.status}`);
        }
        const data = await resp.json();

        if (data.stop_reason === 'tool_use') {
          loopMsgs.push({ role: 'assistant', content: data.content });
          const results = data.content
            .filter(b => b.type === 'tool_use')
            .map(b => ({ type: 'tool_result', tool_use_id: b.id, content: executeTool(b.name, b.input) }));
          loopMsgs.push({ role: 'user', content: results });
          continue;
        }

        finalReply = data.content?.find(b => b.type === 'text')?.text || '';
        break;
      }

      setMsgs(prev => [...prev, { from: 'ai', text: finalReply || 'הפעולה בוצעה.' }]);
    } catch (err) {
      setMsgs(prev => [...prev, { from: 'ai', text: `שגיאה: ${err.message}` }]);
    } finally {
      setLoading(false);
    }
  };

  return (
    <>
      <button className="ai-chat-toggle" onClick={() => setOpen((o) => !o)}>
        <span>✦ צ׳אט AI</span>
        <span style={{marginInlineStart:'auto',fontSize:'11px',opacity:0.55}}>{open ? '▾' : '▴'}</span>
      </button>
      {open && (
        <div className="ai-chat-panel">
          <div className="ai-chat-messages" ref={msgsRef}>
            {msgs.map((m, i) => (
              <div key={i} className={'ai-msg ' + (m.from === 'user' ? 'ai-msg-user' : 'ai-msg-ai')}>{m.text}</div>
            ))}
            {loading && <div className="ai-msg ai-msg-ai" style={{opacity:0.6}}><span className="spin">↻</span> חושב…</div>}
          </div>
          <div className="ai-chat-input-row">
            <input className="ai-chat-input" value={input} placeholder="שאלו שאלה…" disabled={loading}
              onChange={(e) => setInput(e.target.value)}
              onKeyDown={(e) => { if (e.key === 'Enter') send(); }} />
            <button className="ai-send-btn" onClick={send} disabled={loading}>→</button>
          </div>
        </div>
      )}
    </>
  );
}

function EmployeesSidePanel({ schedule, selectedDate, draggingEmp, onDragEmpStart, onDragEnd, editable, apiKey, employees, onEmployeesChange, onAssign, onRemove }) {
  const [nav, setNav] = React.useState('employees');
  const [tab, setTab] = React.useState('all');
  const [shiftFilter, setShiftFilter] = React.useState('all');
  const shiftSettings = React.useContext(window.ShiftSettingsCtx);

  React.useEffect(() => { setShiftFilter('all'); }, [selectedDate]);

  const NAV = [
    { id: 'employees', icon: '👥', label: 'עובדים' },
    { id: 'requests',  icon: '📋', label: 'בקשות'  },
  ];

  const isNightHour = (t) => { const h = parseInt((t || '00').split(':')[0], 10); return h >= 19 || h < 6; };

  const isEligible = (emp, shift) => {
    if (PD.availabilityOn(emp.id, selectedDate) === 'unavailable') return false;
    if (isNightHour(shift.start) && !emp.nights) return false;
    if (PE.countShifts(schedule, emp.id) >= emp.max) return false;
    return true;
  };

  const dayShifts = React.useMemo(() => {
    if (!selectedDate) return [];
    return PD.shiftTypesFor(selectedDate, shiftSettings).filter(s => !s.continuation);
  }, [selectedDate, shiftSettings]);

  const shiftCounts = React.useMemo(() => {
    const out = {};
    dayShifts.forEach(s => {
      out[s.id] = PD.EMPLOYEES.filter(e => isEligible(e, s)).length;
    });
    return out;
  }, [dayShifts, schedule, selectedDate]);

  const isAssigned = (emp, shiftId) => {
    if (!selectedDate || !shiftId || shiftId === 'all') return false;
    const dataDStr = (() => {
      const sh = dayShifts.find(s => s.id === shiftId);
      return sh?.continuation ? sh.originDate : selectedDate;
    })();
    return ((schedule[dataDStr] || {})[shiftId] || []).includes(emp.id);
  };

  const list = React.useMemo(() => {
    let emps = PD.EMPLOYEES;
    if (tab === 'available' && selectedDate) {
      emps = emps.filter(e => PD.availabilityOn(e.id, selectedDate) !== 'unavailable');
      if (shiftFilter !== 'all') {
        const shift = dayShifts.find(s => s.id === shiftFilter);
        if (shift) emps = emps.filter(e => isEligible(e, shift));
      }
      emps = [...emps].sort((a, b) => {
        const avScore = { high: 3, can: 1 };
        const sa = avScore[PD.availabilityOn(a.id, selectedDate)] || 0;
        const sb = avScore[PD.availabilityOn(b.id, selectedDate)] || 0;
        if (sb !== sa) return sb - sa;
        return (b.max - PE.countShifts(schedule, b.id)) - (a.max - PE.countShifts(schedule, a.id));
      });
    }
    return emps;
  }, [tab, shiftFilter, selectedDate, schedule, shiftSettings]);

  return (
    <aside className="side-panel">
      <div className="side-icon-nav">
        {NAV.map((item) => (
          <button key={item.id} className={'side-icon-btn' + (nav === item.id ? ' on' : '')} onClick={() => setNav(item.id)}>
            <span className="sib-icon">{item.icon}</span>
            <span>{item.label}</span>
          </button>
        ))}
      </div>

      {nav === 'employees' && (
        <>
          <div className="side-tabs" role="tablist" style={{paddingTop:'10px'}}>
            <button role="tab" aria-selected={tab === 'all'} className={'side-tab' + (tab === 'all' ? ' on' : '')} onClick={() => setTab('all')}>כל העובדים</button>
            <button role="tab" aria-selected={tab === 'available'} className={'side-tab' + (tab === 'available' ? ' on' : '')} onClick={() => setTab('available')}>זמינים ליום</button>
          </div>

          {tab === 'available' && (
            selectedDate ? (
              <>
                <div className="side-note">
                  זמינים ל־<b>{PD.dayLabel(selectedDate)} {PD.shortDate(selectedDate)}</b>
                </div>
                {dayShifts.length > 0 && (
                  <div className="shift-filter-tabs">
                    <button className={'shift-filter-tab' + (shiftFilter === 'all' ? ' on' : '')} onClick={() => setShiftFilter('all')}>
                      הכל
                    </button>
                    {dayShifts.map(s => (
                      <button key={s.id} className={'shift-filter-tab' + (shiftFilter === s.id ? ' on' : '')} onClick={() => setShiftFilter(s.id)}>
                        {s.name}
                        <span className="shift-filter-count">{shiftCounts[s.id] ?? 0}</span>
                      </button>
                    ))}
                  </div>
                )}
              </>
            ) : (
              <div className="side-note">בחרו יום בלוח לסינון</div>
            )
          )}

          <div className="emp-list">
            {list.map((emp) => {
              const assigned = tab === 'available' && shiftFilter !== 'all' && isAssigned(emp, shiftFilter);
              return (
                <div key={emp.id} style={assigned ? {opacity:0.45} : undefined}>
                  <EmployeeCard emp={emp} schedule={schedule}
                    selectedDate={tab === 'available' ? selectedDate : null}
                    onDragEmpStart={onDragEmpStart} onDragEnd={onDragEnd} editable={editable}
                    extraBadge={assigned ? <span className="assigned-badge">משובץ ✓</span> : null} />
                </div>
              );
            })}
          </div>
          <div className="side-hint">גררו עובד אל משמרת בלוח · גרירת משמרת קיימת = העברה · עם <kbd>Shift</kbd> = שכפול</div>
        </>
      )}

      {nav === 'requests' && <RequestsPanel />}

      <AIChat schedule={schedule} selectedDate={selectedDate} apiKey={apiKey} employees={employees} onEmployeesChange={onEmployeesChange}
        onAssign={onAssign} onRemove={onRemove} editable={editable} />
    </aside>
  );
}

Object.assign(window, { EmployeesSidePanel, EmployeeCard });
</script>
